name: Deploy Shared Infrastructure

on:
  push:
    branches:
      - develop
      - integration/**
      - master
    paths:
      - 'infra/shared/**'
      - '.github/workflows/shared-deploy.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        type: choice
        options:
          - dev
          - prod

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.ref == 'refs/heads/master' && 'prod' || 'dev' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js and install dependencies
        uses: ./.github/actions/setup-node
        with:
          node-version: '22'
          cache-dependency-path: package-lock.json

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Setup deployment environment
        id: setup-environment
        uses: ./.github/actions/setup-environment

      - name: Get AWS Account ID
        id: get-account-id
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "account-id=$ACCOUNT_ID" >> $GITHUB_OUTPUT
          echo "AWS Account ID: $ACCOUNT_ID"

      - name: CDK Bootstrap (if needed)
        env:
          DOMAIN_NAME: ${{ secrets.DOMAIN_NAME }}
        run: |
          npm run bootstrap --workspace=@nagiyu/shared-infra -- aws://${{ steps.get-account-id.outputs.account-id }}/us-east-1

      - name: CDK Synth
        env:
          DOMAIN_NAME: ${{ secrets.DOMAIN_NAME }}
        run: |
          npm run synth --workspace=@nagiyu/shared-infra -- --all --context env=${{ steps.setup-environment.outputs.environment }}

      - name: CDK Deploy
        env:
          DOMAIN_NAME: ${{ secrets.DOMAIN_NAME }}
        run: |
          npm run deploy --workspace=@nagiyu/shared-infra -- --all \
            --context env=${{ steps.setup-environment.outputs.environment }} \
            --require-approval never

      - name: Summary
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment**: ${{ steps.setup-environment.outputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Region**: us-east-1" >> $GITHUB_STEP_SUMMARY
          echo "- **Stacks**: VPC, ACM, IAM Policies, IAM Users" >> $GITHUB_STEP_SUMMARY
