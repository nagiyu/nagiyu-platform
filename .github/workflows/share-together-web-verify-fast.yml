name: Share Together Web - Fast Verification

on:
  pull_request:
    branches:
      - integration/**
    paths:
      - 'services/share-together/**'
      - 'infra/share-together/**'
      - 'libs/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/share-together-web-verify-fast.yml'

permissions:
  contents: read

jobs:
  lint:
    name: Lint Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: './package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint on core
        run: npm run lint --workspace=@nagiyu/share-together-core

      - name: Run ESLint on web
        run: npm run lint --workspace=@nagiyu/share-together-web

  format-check:
    name: Format Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: './package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Check core formatting
        run: npm run format:check --workspace=@nagiyu/share-together-core

      - name: Check web formatting
        run: npm run format:check --workspace=@nagiyu/share-together-web

  build-core:
    name: Build Core Package
    runs-on: ubuntu-latest
    needs: [lint, format-check]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: './package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Build shared libraries
        run: npm run build --workspace @nagiyu/common

      - name: Build core package
        run: npm run build --workspace=@nagiyu/share-together-core

  build-web:
    name: Build Web Package
    runs-on: ubuntu-latest
    needs: [build-core]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: './package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Build shared libraries
        run: |
          npm run build --workspace @nagiyu/common
          npm run build --workspace @nagiyu/browser
          npm run build --workspace @nagiyu/ui

      - name: Build core package
        run: npm run build --workspace=@nagiyu/share-together-core

      - name: Build web application
        run: npm run build --workspace=@nagiyu/share-together-web

  docker-build:
    name: Docker Build Web
    runs-on: ubuntu-latest
    needs: [build-web]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build web Docker image
        env:
          DOCKER_BUILDKIT: 0
        run: docker build -t share-together-web-verify-fast-test -f services/share-together/web/Dockerfile .

  test-core:
    name: Core Unit Tests
    runs-on: ubuntu-latest
    needs: [build-core]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: './package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Build shared libraries
        run: npm run build --workspace @nagiyu/common

      - name: Build core package
        run: npm run build --workspace=@nagiyu/share-together-core

      - name: Run core tests
        run: npm run test --workspace=@nagiyu/share-together-core

  e2e-test:
    name: E2E Tests (chromium-mobile only)
    runs-on: ubuntu-latest
    needs: [build-web]

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: './package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Build shared libraries
        run: |
          npm run build --workspace @nagiyu/common
          npm run build --workspace @nagiyu/browser
          npm run build --workspace @nagiyu/ui

      - name: Build core package
        run: npm run build --workspace=@nagiyu/share-together-core

      - name: Build web application
        run: npm run build --workspace=@nagiyu/share-together-web

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium
        working-directory: ./services/share-together/web

      - name: Run E2E tests (chromium-mobile only)
        env:
          CI: true
        run: npm run test:e2e --workspace=@nagiyu/share-together-web -- --project=chromium-mobile

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-fast
          path: services/share-together/web/playwright-report/
          retention-days: 30

      - name: Upload test artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-fast
          path: services/share-together/web/test-results/
          retention-days: 30

  synth-infra:
    name: Synthesize Infrastructure
    runs-on: ubuntu-latest
    needs: [lint, format-check]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: './package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Build common infrastructure package
        run: npm run build --workspace=@nagiyu/infra-common

      - name: Build infrastructure package
        run: npm run build --workspace=@nagiyu/infra

      - name: Synthesize CDK stack
        run: npm run synth --workspace=@nagiyu/infra -- --context env=dev
