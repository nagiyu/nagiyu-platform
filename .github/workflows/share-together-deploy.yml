name: Share Together - Build and Deploy

on:
  push:
    branches:
      - develop
      - integration/**
      - master
    paths:
      - 'services/share-together/**'
      - 'infra/share-together/**'
      - 'libs/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/share-together-deploy.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        type: choice
        options:
          - dev
          - prod

permissions:
  contents: read

env:
  AWS_REGION: us-east-1

jobs:
  infrastructure-ecr:
    name: Deploy ECR and Core Infrastructure
    runs-on: ubuntu-latest

    outputs:
      environment: ${{ steps.setup-environment.outputs.environment }}
      stack-suffix: ${{ steps.setup-environment.outputs.stack-suffix }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js and install dependencies
        uses: ./.github/actions/setup-node
        with:
          node-version: '24'

      - name: Setup deployment environment
        id: setup-environment
        uses: ./.github/actions/setup-environment

      - name: Build common infrastructure package
        run: npm run build --workspace=@nagiyu/infra-common

      - name: Build CDK TypeScript
        run: npm run build --workspace=@nagiyu/infra-share-together

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy ECR and DynamoDB Stacks
        env:
          ENVIRONMENT: ${{ steps.setup-environment.outputs.environment }}
          STACK_SUFFIX: ${{ steps.setup-environment.outputs.stack-suffix }}
        run: |
          npm run cdk --workspace=@nagiyu/infra-share-together -- deploy \
            NagiyuShareTogetherECR${STACK_SUFFIX} \
            NagiyuShareTogetherDynamoDB${STACK_SUFFIX} \
            --context env="$ENVIRONMENT" \
            --require-approval never

  build:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: infrastructure-ecr

    outputs:
      image-uri: ${{ steps.build-image.outputs.image-uri }}
      environment: ${{ needs.infrastructure-ecr.outputs.environment }}
      stack-suffix: ${{ needs.infrastructure-ecr.outputs.stack-suffix }}
      app-version: ${{ steps.get-version.outputs.app-version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version from package.json
        id: get-version
        working-directory: ./services/share-together/web
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "app-version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build web application
        uses: ./.github/actions/build-web-app
        with:
          workspace: '@nagiyu/share-together-web'
          shared-workspaces: '@nagiyu/common,@nagiyu/browser,@nagiyu/ui,@nagiyu/nextjs,@nagiyu/aws,@nagiyu/share-together-core'

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get ECR repository from CDK stack
        id: get-ecr
        env:
          STACK_SUFFIX: ${{ needs.infrastructure-ecr.outputs.stack-suffix }}
        run: |
          STACK_NAME="NagiyuShareTogetherECR${STACK_SUFFIX}"

          REPOSITORY_URI=$(aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" \
            --query "Stacks[0].Outputs[?OutputKey=='RepositoryUri'].OutputValue" \
            --output text \
            --region "${{ env.AWS_REGION }}")

          if [ -z "$REPOSITORY_URI" ]; then
            echo "Error: Could not find ECR repository URI from CDK stack $STACK_NAME"
            exit 1
          fi

          echo "repository-uri=$REPOSITORY_URI" >> "$GITHUB_OUTPUT"

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        uses: ./.github/actions/build-docker-image
        with:
          dockerfile: services/share-together/web/Dockerfile
          image-tag: ${{ steps.get-ecr.outputs.repository-uri }}:latest
          app-version: ${{ steps.get-version.outputs.app-version }}

      - name: Push Docker image
        id: build-image
        env:
          REPOSITORY_URI: ${{ steps.get-ecr.outputs.repository-uri }}
          IMAGE_TAG: latest
        run: |
          docker push "$REPOSITORY_URI:$IMAGE_TAG"

          echo "image-uri=$REPOSITORY_URI:$IMAGE_TAG" >> "$GITHUB_OUTPUT"

  infrastructure-app:
    name: Deploy Application Infrastructure
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js and install dependencies
        uses: ./.github/actions/setup-node
        with:
          node-version: '24'

      - name: Build common infrastructure package
        run: npm run build --workspace=@nagiyu/infra-common

      - name: Build CDK TypeScript
        run: npm run build --workspace=@nagiyu/infra-share-together

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Fetch secrets from Secrets Manager
        id: fetch-secrets
        uses: aws-actions/aws-secretsmanager-get-secrets@v2
        with:
          secret-ids: |
            NEXTAUTH_SECRET,nagiyu-auth-nextauth-secret-${{ needs.build.outputs.environment }}

      - name: Deploy Lambda, IAM and CloudFront Stacks
        env:
          ENVIRONMENT: ${{ needs.build.outputs.environment }}
          STACK_SUFFIX: ${{ needs.build.outputs.stack-suffix }}
          APP_VERSION: ${{ needs.build.outputs.app-version }}
          SECRET_VALUE: ${{ env.NEXTAUTH_SECRET }}
        run: |
          npm run cdk --workspace=@nagiyu/infra-share-together -- deploy \
            --all \
            --exclude NagiyuShareTogetherECR${STACK_SUFFIX} \
            --context env="$ENVIRONMENT" \
            --context appVersion="$APP_VERSION" \
            --context nextAuthSecret="$SECRET_VALUE" \
            --require-approval never

      - name: Update Lambda function with latest image
        env:
          ENVIRONMENT: ${{ needs.build.outputs.environment }}
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          ECR_REGISTRY="${ACCOUNT_ID}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com"
          IMAGE_URI="${ECR_REGISTRY}/nagiyu-share-together-ecr-${ENVIRONMENT}:latest"

          aws lambda update-function-code \
            --function-name "nagiyu-share-together-lambda-${ENVIRONMENT}" \
            --image-uri "$IMAGE_URI" \
            --region "${{ env.AWS_REGION }}"

      - name: Wait for Lambda update to complete
        env:
          ENVIRONMENT: ${{ needs.build.outputs.environment }}
        run: |
          aws lambda wait function-updated \
            --function-name "nagiyu-share-together-lambda-${ENVIRONMENT}" \
            --region "${{ env.AWS_REGION }}"
