name: QuickClip - Verification

on:
  pull_request:
    branches:
      - integration/**
      - develop
    paths:
      - 'services/quick-clip/**'
      - 'infra/quick-clip/**'
      - 'libs/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/quick-clip-verify.yml'

permissions:
  contents: read

jobs:
  lint:
    name: Lint Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js and install dependencies
        uses: ./.github/actions/setup-node
        with:
          node-version: '24'
          cache-dependency-path: './package-lock.json'

      - name: Run ESLint on core
        run: npm run lint --workspace=@nagiyu/quick-clip-core

      - name: Run ESLint on web
        run: npm run lint --workspace=@nagiyu/quick-clip-web

      - name: Run ESLint on batch
        run: npm run lint --workspace=@nagiyu/quick-clip-batch

      - name: Run ESLint on clip lambda
        run: npm run lint --workspace=@nagiyu/quick-clip-lambda-clip

      - name: Run ESLint on zip lambda
        run: npm run lint --workspace=@nagiyu/quick-clip-lambda-zip

  format-check:
    name: Format Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js and install dependencies
        uses: ./.github/actions/setup-node
        with:
          node-version: '24'
          cache-dependency-path: './package-lock.json'

      - name: Check core formatting
        run: npm run format:check --workspace=@nagiyu/quick-clip-core

      - name: Check web formatting
        run: npm run format:check --workspace=@nagiyu/quick-clip-web

      - name: Check batch formatting
        run: npm run format:check --workspace=@nagiyu/quick-clip-batch

      - name: Check clip lambda formatting
        run: npm run format:check --workspace=@nagiyu/quick-clip-lambda-clip

      - name: Check zip lambda formatting
        run: npm run format:check --workspace=@nagiyu/quick-clip-lambda-zip

  infra-lint:
    name: Infrastructure Lint Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js and install dependencies
        uses: ./.github/actions/setup-node
        with:
          node-version: '24'
          cache-dependency-path: './package-lock.json'

      - name: Run ESLint on infrastructure package
        run: npm run lint --workspace=@nagiyu/infra-quick-clip

  infra-format-check:
    name: Infrastructure Format Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js and install dependencies
        uses: ./.github/actions/setup-node
        with:
          node-version: '24'
          cache-dependency-path: './package-lock.json'

      - name: Check infrastructure formatting
        run: npm run format:check --workspace=@nagiyu/infra-quick-clip

  build-core:
    name: Build Core Package
    runs-on: ubuntu-latest
    needs: [lint, format-check]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js and install dependencies
        uses: ./.github/actions/setup-node
        with:
          node-version: '24'
          cache-dependency-path: './package-lock.json'

      - name: Build shared libraries
        uses: ./.github/actions/build-shared-workspaces
        with:
          shared-workspaces: '@nagiyu/common,@nagiyu/browser,@nagiyu/react,@nagiyu/nextjs,@nagiyu/ui'

      - name: Build core package
        run: npm run build --workspace=@nagiyu/quick-clip-core

  build-web:
    name: Build Web Package
    runs-on: ubuntu-latest
    needs: [build-core]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build web application
        uses: ./.github/actions/build-web-app
        with:
          workspace: '@nagiyu/quick-clip-web'
          shared-workspaces: '@nagiyu/common,@nagiyu/browser,@nagiyu/react,@nagiyu/nextjs,@nagiyu/ui,@nagiyu/quick-clip-core'

  build-batch:
    name: Build Batch Package
    runs-on: ubuntu-latest
    needs: [build-core]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js and install dependencies
        uses: ./.github/actions/setup-node
        with:
          node-version: '24'
          cache-dependency-path: './package-lock.json'

      - name: Build shared libraries
        uses: ./.github/actions/build-shared-workspaces
        with:
          shared-workspaces: '@nagiyu/common,@nagiyu/browser,@nagiyu/react,@nagiyu/nextjs,@nagiyu/ui'

      - name: Build core package
        run: npm run build --workspace=@nagiyu/quick-clip-core

      - name: Build batch package
        run: npm run build --workspace=@nagiyu/quick-clip-batch

  build-lambda-clip:
    name: Build Lambda Clip Package
    runs-on: ubuntu-latest
    needs: [build-core]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js and install dependencies
        uses: ./.github/actions/setup-node
        with:
          node-version: '24'
          cache-dependency-path: './package-lock.json'

      - name: Build shared libraries
        uses: ./.github/actions/build-shared-workspaces
        with:
          shared-workspaces: '@nagiyu/common'

      - name: Build core package
        run: npm run build --workspace=@nagiyu/quick-clip-core

      - name: Build lambda clip package
        run: npm run build --workspace=@nagiyu/quick-clip-lambda-clip

  build-lambda-zip:
    name: Build Lambda Zip Package
    runs-on: ubuntu-latest
    needs: [build-core]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js and install dependencies
        uses: ./.github/actions/setup-node
        with:
          node-version: '24'
          cache-dependency-path: './package-lock.json'

      - name: Build shared libraries
        uses: ./.github/actions/build-shared-workspaces
        with:
          shared-workspaces: '@nagiyu/common'

      - name: Build core package
        run: npm run build --workspace=@nagiyu/quick-clip-core

      - name: Build lambda zip package
        run: npm run build --workspace=@nagiyu/quick-clip-lambda-zip

  build-infra:
    name: Build Infrastructure Package
    runs-on: ubuntu-latest
    needs: [lint, format-check, infra-lint, infra-format-check]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js and install dependencies
        uses: ./.github/actions/setup-node
        with:
          node-version: '24'
          cache-dependency-path: './package-lock.json'

      - name: Build common infrastructure package
        run: npm run build --workspace=@nagiyu/infra-common

      - name: Build infrastructure package
        run: npm run build --workspace=@nagiyu/infra-quick-clip

  test-core:
    name: Core Unit Tests
    runs-on: ubuntu-latest
    needs: [build-core]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js and install dependencies
        uses: ./.github/actions/setup-node
        with:
          node-version: '24'
          cache-dependency-path: './package-lock.json'

      - name: Build shared libraries
        uses: ./.github/actions/build-shared-workspaces
        with:
          shared-workspaces: '@nagiyu/common,@nagiyu/browser,@nagiyu/react,@nagiyu/nextjs,@nagiyu/ui'

      - name: Build core package
        run: npm run build --workspace=@nagiyu/quick-clip-core

      - name: Run core tests
        run: npm run test --workspace=@nagiyu/quick-clip-core

  test-web:
    name: Web Unit Tests
    runs-on: ubuntu-latest
    needs: [build-web]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js and install dependencies
        uses: ./.github/actions/setup-node
        with:
          node-version: '24'
          cache-dependency-path: './package-lock.json'

      - name: Build shared libraries
        uses: ./.github/actions/build-shared-workspaces
        with:
          shared-workspaces: '@nagiyu/common,@nagiyu/browser,@nagiyu/react,@nagiyu/nextjs,@nagiyu/ui'

      - name: Build core package
        run: npm run build --workspace=@nagiyu/quick-clip-core

      - name: Run web unit tests
        run: npm run test --workspace=@nagiyu/quick-clip-web

  test-batch:
    name: Batch Unit Tests
    runs-on: ubuntu-latest
    needs: [build-batch]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js and install dependencies
        uses: ./.github/actions/setup-node
        with:
          node-version: '24'
          cache-dependency-path: './package-lock.json'

      - name: Build shared libraries
        uses: ./.github/actions/build-shared-workspaces
        with:
          shared-workspaces: '@nagiyu/common,@nagiyu/browser,@nagiyu/react,@nagiyu/nextjs,@nagiyu/ui'

      - name: Build core package
        run: npm run build --workspace=@nagiyu/quick-clip-core

      - name: Build batch package
        run: npm run build --workspace=@nagiyu/quick-clip-batch

      - name: Run batch tests
        run: npm run test --workspace=@nagiyu/quick-clip-batch

  test-lambda-clip:
    name: Lambda Clip Unit Tests
    runs-on: ubuntu-latest
    needs: [build-lambda-clip]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js and install dependencies
        uses: ./.github/actions/setup-node
        with:
          node-version: '24'
          cache-dependency-path: './package-lock.json'

      - name: Build core package
        run: npm run build --workspace=@nagiyu/quick-clip-core

      - name: Build lambda clip package
        run: npm run build --workspace=@nagiyu/quick-clip-lambda-clip

      - name: Run lambda clip tests
        run: npm run test --workspace=@nagiyu/quick-clip-lambda-clip

  test-lambda-zip:
    name: Lambda Zip Unit Tests
    runs-on: ubuntu-latest
    needs: [build-lambda-zip]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js and install dependencies
        uses: ./.github/actions/setup-node
        with:
          node-version: '24'
          cache-dependency-path: './package-lock.json'

      - name: Build lambda zip package
        run: npm run build --workspace=@nagiyu/quick-clip-lambda-zip
      - name: Build core package
        run: npm run build --workspace=@nagiyu/quick-clip-core

      - name: Run lambda zip tests
        run: npm run test --workspace=@nagiyu/quick-clip-lambda-zip

  coverage:
    name: Coverage Check (80% threshold)
    runs-on: ubuntu-latest
    needs: [build-core]
    if: github.base_ref == 'develop'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js and install dependencies
        uses: ./.github/actions/setup-node
        with:
          node-version: '24'
          cache-dependency-path: './package-lock.json'

      - name: Build shared libraries
        uses: ./.github/actions/build-shared-workspaces
        with:
          shared-workspaces: '@nagiyu/common,@nagiyu/browser,@nagiyu/react,@nagiyu/nextjs,@nagiyu/ui'

      - name: Build core package
        run: npm run build --workspace=@nagiyu/quick-clip-core

      - name: Run coverage check
        run: npm run test:coverage --workspace=@nagiyu/quick-clip-core

  docker-build-web:
    name: Docker Build Web
    runs-on: ubuntu-latest
    needs: [build-web]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version from package.json
        id: get-version
        working-directory: ./services/quick-clip/web
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "app-version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Build Web Docker image
        uses: ./.github/actions/build-docker-image
        with:
          dockerfile: services/quick-clip/web/Dockerfile
          image-tag: quick-clip-web-verify-full-test
          build-args: APP_VERSION=${{ steps.get-version.outputs.app-version }}

  docker-build-batch:
    name: Docker Build Batch
    runs-on: ubuntu-latest
    needs: [build-batch]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version from package.json
        id: get-version
        working-directory: ./services/quick-clip/batch
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "app-version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Build Batch Docker image
        uses: ./.github/actions/build-docker-image
        with:
          dockerfile: services/quick-clip/batch/Dockerfile
          image-tag: quick-clip-batch-verify-full-test
          build-args: APP_VERSION=${{ steps.get-version.outputs.app-version }}

  docker-build-lambda-clip:
    name: Docker Build Lambda Clip
    runs-on: ubuntu-latest
    needs: [build-lambda-clip]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version from package.json
        id: get-version
        working-directory: ./services/quick-clip/lambda/clip
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "app-version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Build Lambda Clip Docker image
        uses: ./.github/actions/build-docker-image
        with:
          dockerfile: services/quick-clip/lambda/clip/Dockerfile
          image-tag: quick-clip-lambda-clip-verify-full-test
          build-args: APP_VERSION=${{ steps.get-version.outputs.app-version }}

  docker-build-lambda-zip:
    name: Docker Build Lambda Zip
    runs-on: ubuntu-latest
    needs: [build-lambda-zip]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version from package.json
        id: get-version
        working-directory: ./services/quick-clip/lambda/zip
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "app-version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Build Lambda Zip Docker image
        uses: ./.github/actions/build-docker-image
        with:
          dockerfile: services/quick-clip/lambda/zip/Dockerfile
          image-tag: quick-clip-lambda-zip-verify-full-test
          build-args: APP_VERSION=${{ steps.get-version.outputs.app-version }}

  e2e-test-web-chromium-mobile:
    name: E2E Tests (chromium-mobile)
    runs-on: ubuntu-latest
    needs: [build-web]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js and install dependencies
        uses: ./.github/actions/setup-node
        with:
          node-version: '24'
          cache-dependency-path: './package-lock.json'

      - name: Build shared libraries
        uses: ./.github/actions/build-shared-workspaces
        with:
          shared-workspaces: '@nagiyu/common,@nagiyu/browser,@nagiyu/react,@nagiyu/nextjs,@nagiyu/ui'

      - name: Build core package
        run: npm run build --workspace=@nagiyu/quick-clip-core

      - name: Build web application
        run: npm run build --workspace=@nagiyu/quick-clip-web

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium
        working-directory: ./services/quick-clip/web

      - name: Run E2E tests (chromium-mobile)
        env:
          CI: true
          PROJECT: chromium-mobile
        run: npm run test:e2e --workspace=@nagiyu/quick-clip-web

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-full-chromium-mobile
          path: services/quick-clip/web/playwright-report/
          retention-days: 30

      - name: Upload test artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-full-chromium-mobile
          path: services/quick-clip/web/test-results/
          retention-days: 30

  e2e-test-web-chromium-desktop:
    name: E2E Tests (chromium-desktop)
    runs-on: ubuntu-latest
    needs: [build-web]
    if: github.base_ref == 'develop'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js and install dependencies
        uses: ./.github/actions/setup-node
        with:
          node-version: '24'
          cache-dependency-path: './package-lock.json'

      - name: Build shared libraries
        uses: ./.github/actions/build-shared-workspaces
        with:
          shared-workspaces: '@nagiyu/common,@nagiyu/browser,@nagiyu/react,@nagiyu/nextjs,@nagiyu/ui'

      - name: Build core package
        run: npm run build --workspace=@nagiyu/quick-clip-core

      - name: Build web application
        run: npm run build --workspace=@nagiyu/quick-clip-web

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium
        working-directory: ./services/quick-clip/web

      - name: Run E2E tests (chromium-desktop)
        env:
          CI: true
          PROJECT: chromium-desktop
        run: npm run test:e2e --workspace=@nagiyu/quick-clip-web

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-full-chromium-desktop
          path: services/quick-clip/web/playwright-report/
          retention-days: 30

      - name: Upload test artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-full-chromium-desktop
          path: services/quick-clip/web/test-results/
          retention-days: 30

  e2e-test-web-webkit-mobile:
    name: E2E Tests (webkit-mobile)
    runs-on: ubuntu-latest
    needs: [build-web]
    if: github.base_ref == 'develop'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js and install dependencies
        uses: ./.github/actions/setup-node
        with:
          node-version: '24'
          cache-dependency-path: './package-lock.json'

      - name: Build shared libraries
        uses: ./.github/actions/build-shared-workspaces
        with:
          shared-workspaces: '@nagiyu/common,@nagiyu/browser,@nagiyu/react,@nagiyu/nextjs,@nagiyu/ui'

      - name: Build core package
        run: npm run build --workspace=@nagiyu/quick-clip-core

      - name: Build web application
        run: npm run build --workspace=@nagiyu/quick-clip-web

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps webkit
        working-directory: ./services/quick-clip/web

      - name: Run E2E tests (webkit-mobile)
        env:
          CI: true
          PROJECT: webkit-mobile
        run: npm run test:e2e --workspace=@nagiyu/quick-clip-web

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-full-webkit-mobile
          path: services/quick-clip/web/playwright-report/
          retention-days: 30

      - name: Upload test artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-full-webkit-mobile
          path: services/quick-clip/web/test-results/
          retention-days: 30

  report:
    name: Report Results to PR
    runs-on: ubuntu-latest
    if: always()
    needs:
      [
        lint,
        format-check,
        infra-lint,
        infra-format-check,
        build-core,
        build-web,
        build-batch,
        build-lambda-clip,
        build-lambda-zip,
        build-infra,
        test-core,
        test-web,
        test-batch,
        test-lambda-clip,
        test-lambda-zip,
        coverage,
        docker-build-web,
        docker-build-batch,
        docker-build-lambda-clip,
        docker-build-lambda-zip,
        e2e-test-web-chromium-mobile,
        e2e-test-web-chromium-desktop,
        e2e-test-web-webkit-mobile,
      ]
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Create PR Comment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const results = {
              'Lint': '${{ needs.lint.result }}',
              'Format Check': '${{ needs.format-check.result }}',
              'Infra Lint Check': '${{ needs.infra-lint.result }}',
              'Infra Format Check': '${{ needs.infra-format-check.result }}',
              'Build Core': '${{ needs.build-core.result }}',
              'Build Web': '${{ needs.build-web.result }}',
              'Build Batch': '${{ needs.build-batch.result }}',
              'Build Lambda Clip': '${{ needs.build-lambda-clip.result }}',
              'Build Lambda Zip': '${{ needs.build-lambda-zip.result }}',
              'Build Infra': '${{ needs.build-infra.result }}',
              'Test Core': '${{ needs.test-core.result }}',
              'Test Web': '${{ needs.test-web.result }}',
              'Test Batch': '${{ needs.test-batch.result }}',
              'Test Lambda Clip': '${{ needs.test-lambda-clip.result }}',
              'Test Lambda Zip': '${{ needs.test-lambda-zip.result }}',
              'Coverage (80%)': '${{ needs.coverage.result }}',
              'Docker Build Web': '${{ needs.docker-build-web.result }}',
              'Docker Build Batch': '${{ needs.docker-build-batch.result }}',
              'Docker Build Lambda Clip': '${{ needs.docker-build-lambda-clip.result }}',
              'Docker Build Lambda Zip': '${{ needs.docker-build-lambda-zip.result }}',
              'E2E Tests (chromium-mobile)': '${{ needs.e2e-test-web-chromium-mobile.result }}',
              'E2E Tests (chromium-desktop)': '${{ needs.e2e-test-web-chromium-desktop.result }}',
              'E2E Tests (webkit-mobile)': '${{ needs.e2e-test-web-webkit-mobile.result }}'
            };

            const statusEmoji = {
              success: '✅',
              failure: '❌',
              cancelled: '⚠️',
              skipped: '⏭️'
            };

            const allSuccess = Object.values(results).every(r => r === 'success' || r === 'skipped');
            const isFull = context.payload.pull_request?.base?.ref === 'develop';
            const header = allSuccess
              ? (isFull ? '## ✅ All Full Checks Passed' : '## ✅ All Fast Checks Passed')
              : (isFull ? '## ❌ Some Full Checks Failed' : '## ❌ Some Fast Checks Failed');

            let body = `${header}\n\n`;
            body += isFull ? '**QuickClip - Full Verification**\n\n' : '**QuickClip - Fast Verification**\n\n';
            body += '| Job | Status |\n';
            body += '|-----|--------|\n';

            for (const [job, result] of Object.entries(results)) {
              const emoji = statusEmoji[result] || '❓';
              body += `| ${job} | ${emoji} ${result} |\n`;
            }

            body += `\n[View workflow run](${context.payload.repository.html_url}/actions/runs/${context.runId})`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });
