name: Auth App - Verification

on:
  pull_request:
    branches:
      - integration/**
      - develop
    paths:
      - 'services/auth/**'
      - 'libs/common/**'
      - 'infra/auth/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/auth-verify-app.yml'

permissions:
  contents: read

jobs:
  lint:
    name: Lint Code
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js and install dependencies
        uses: ./.github/actions/setup-node
        with:
          node-version: '22'
          cache-dependency-path: './package-lock.json'

      - name: Run lint
        run: |
          npm run lint --workspace @nagiyu/auth-core
          npm run lint --workspace @nagiyu/auth-web

  format-check:
    name: Format Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js and install dependencies
        uses: ./.github/actions/setup-node
        with:
          node-version: '22'
          cache-dependency-path: './package-lock.json'

      - name: Check formatting
        run: |
          npm run format:check --workspace @nagiyu/auth-core
          npm run format:check --workspace @nagiyu/auth-web

  unit-test:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    needs: [build]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js and install dependencies
        uses: ./.github/actions/setup-node
        with:
          node-version: '22'
          cache-dependency-path: './package-lock.json'

      - name: Build shared libraries
        run: |
          npm run build --workspace @nagiyu/common
          npm run build --workspace @nagiyu/browser
          npm run build --workspace @nagiyu/ui
          npm run build --workspace @nagiyu/aws
          npm run build --workspace @nagiyu/nextjs

      - name: Run unit tests (auth-core)
        run: npm run test --workspace @nagiyu/auth-core

      - name: Run unit tests (auth-web)
        run: npm run test --workspace @nagiyu/auth-web

  # TODO: Uncomment when coverage check is implemented
  # coverage:
  #   name: Test Coverage Check
  #   runs-on: ubuntu-latest
  #
  #   steps:
  #     - name: Checkout code
  #       uses: actions/checkout@v4
  #
  #     - name: Setup Node.js
  #       uses: actions/setup-node@v4
  #       with:
  #         node-version: '22'
  #         cache: 'npm'
  #         cache-dependency-path: './package-lock.json'
  #
  #     - name: Install dependencies
  #       run: npm ci
  #
  #     - name: Build shared libraries
  #       run: |
  #         npm run build --workspace @nagiyu/common
  #         npm run build --workspace @nagiyu/browser
  #         npm run build --workspace @nagiyu/ui
  #
