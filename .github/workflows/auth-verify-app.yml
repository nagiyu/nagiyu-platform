  #       run: npm run test -- --coverage
  #       working-directory: ./services/auth
  #
  #     - name: Upload coverage report
  #       uses: actions/upload-artifact@v4
  #       if: always()
  #       with:
  #         name: coverage-report
  #         path: services/auth/coverage/
  #         retention-days: 30

  e2e-test-chromium-mobile:
    name: Run E2E Tests (chromium-mobile)
    runs-on: ubuntu-latest
    needs: [unit-test]

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js and install dependencies
        uses: ./.github/actions/setup-node
        with:
          node-version: '22'
          cache-dependency-path: './package-lock.json'

      - name: Build shared libraries
        run: |
          npm run build --workspace @nagiyu/common
          npm run build --workspace @nagiyu/browser
          npm run build --workspace @nagiyu/ui
          npm run build --workspace @nagiyu/aws
          npm run build --workspace @nagiyu/nextjs

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium
        working-directory: ./services/auth/web

      - name: Run Playwright tests (chromium-mobile)
        env:
          CI: true
        run: |
          npm run test:e2e --workspace @nagiyu/auth-web -- --project=chromium-mobile
          if [ $? -ne 0 ]; then
            echo "E2E tests failed"
            exit 1
          fi

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-full-chromium-mobile
          path: services/auth/web/playwright-report/
          retention-days: 30

      - name: Upload test artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-full-chromium-mobile
          path: services/auth/web/test-results/
          retention-days: 30

  e2e-test-chromium-desktop:
    name: Run E2E Tests (chromium-desktop)
    runs-on: ubuntu-latest
    needs: [unit-test]
    if: github.base_ref == 'develop'

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js and install dependencies
        uses: ./.github/actions/setup-node
        with:
          node-version: '22'
          cache-dependency-path: './package-lock.json'

      - name: Build shared libraries
        run: |
          npm run build --workspace @nagiyu/common
          npm run build --workspace @nagiyu/browser
          npm run build --workspace @nagiyu/ui
          npm run build --workspace @nagiyu/aws
          npm run build --workspace @nagiyu/nextjs

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium
        working-directory: ./services/auth/web

      - name: Run Playwright tests (chromium-desktop)
        env:
          CI: true
        run: |
          npm run test:e2e --workspace @nagiyu/auth-web -- --project=chromium-desktop
          if [ $? -ne 0 ]; then
            echo "E2E tests failed"
            exit 1
          fi

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-full-chromium-desktop
          path: services/auth/web/playwright-report/
          retention-days: 30

      - name: Upload test artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-full-chromium-desktop
          path: services/auth/web/test-results/
          retention-days: 30

  e2e-test-webkit-mobile:
    name: Run E2E Tests (webkit-mobile)
    runs-on: ubuntu-latest
    needs: [unit-test]
    if: github.base_ref == 'develop'

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js and install dependencies
        uses: ./.github/actions/setup-node
        with:
          node-version: '22'
          cache-dependency-path: './package-lock.json'

      - name: Build shared libraries
        run: |
          npm run build --workspace @nagiyu/common
          npm run build --workspace @nagiyu/browser
          npm run build --workspace @nagiyu/ui
          npm run build --workspace @nagiyu/aws
          npm run build --workspace @nagiyu/nextjs

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps webkit
        working-directory: ./services/auth/web

      - name: Run Playwright tests (webkit-mobile)
        env:
          CI: true
        run: |
          npm run test:e2e --workspace @nagiyu/auth-web -- --project=webkit-mobile
          if [ $? -ne 0 ]; then
            echo "E2E tests failed"
            exit 1
          fi

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-full-webkit-mobile
          path: services/auth/web/playwright-report/
          retention-days: 30

      - name: Upload test artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-full-webkit-mobile
          path: services/auth/web/test-results/
          retention-days: 30

  build:
    name: Next.js Build Verification
    runs-on: ubuntu-latest
    needs: [lint, format-check]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Next.js application
        uses: ./.github/actions/build-web-app
        with:
          workspace: '@nagiyu/auth-web'
          shared-workspaces: '@nagiyu/common,@nagiyu/browser,@nagiyu/ui,@nagiyu/aws,@nagiyu/nextjs,@nagiyu/auth-core'

  docker-build:
    name: Docker Build Verification
    runs-on: ubuntu-latest
    needs: [build]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version from package.json
        id: get-version
        working-directory: ./services/auth/web
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "app-version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Build Docker image
        uses: ./.github/actions/build-docker-image
        with:
          dockerfile: services/auth/web/Dockerfile
          image-tag: auth-verify-full-test
          app-version: ${{ steps.get-version.outputs.app-version }}

  report:
    name: Report Results to PR
    runs-on: ubuntu-latest
    if: always()
    needs:
      [
        lint,
        format-check,
        unit-test,
        e2e-test-chromium-mobile,
        e2e-test-chromium-desktop,
        e2e-test-webkit-mobile,
        build,
        docker-build,
      ]
    # TODO: Add coverage to needs when implemented
    # needs: [lint, format-check, unit-test, coverage, e2e-test, build, docker-build]

    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Create PR Comment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const results = {
              'Lint': '${{ needs.lint.result }}',
              'Format Check': '${{ needs.format-check.result }}',
              'Unit Tests': '${{ needs.unit-test.result }}',
              // TODO: Uncomment when coverage check is implemented
              // 'Coverage Check': '${{ needs.coverage.result }}',
              'E2E Tests (chromium-mobile)': '${{ needs.e2e-test-chromium-mobile.result }}',
              'E2E Tests (chromium-desktop)': '${{ needs.e2e-test-chromium-desktop.result }}',
              'E2E Tests (webkit-mobile)': '${{ needs.e2e-test-webkit-mobile.result }}',
              'Next.js Build': '${{ needs.build.result }}',
              'Docker Build': '${{ needs.docker-build.result }}'
            };

            const statusEmoji = {
              'success': '✅',
              'failure': '❌',
              'cancelled': '⚠️',
              'skipped': '⏭️'
            };

            const allSuccess = Object.values(results).every(r => r === 'success' || r === 'skipped');
            const isFull = github.base_ref === 'develop';
            const header = allSuccess
              ? (isFull ? '## ✅ All Full Checks Passed' : '## ✅ All Fast Checks Passed')
              : (isFull ? '## ❌ Some Full Checks Failed' : '## ❌ Some Fast Checks Failed');

            let body = `${header}\n\n`;
            body += isFull
              ? '**Full Verification (All devices)**\n\n'
              : '**Fast Verification (E2E: chromium-mobile only)**\n\n';
            body += '| Job | Status |\n';
            body += '|-----|--------|\n';

            for (const [job, result] of Object.entries(results)) {
              const emoji = statusEmoji[result] || '❓';
              body += `| ${job} | ${emoji} ${result} |\n`;
            }

            body += `\n[View workflow run](${context.payload.repository.html_url}/actions/runs/${context.runId})`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
