name: Share Together Web - Full Verification

on:
  pull_request:
    branches:
      - develop
    paths:
      - 'services/share-together/**'
      - 'infra/share-together/**'
      - 'libs/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/share-together-web-verify-full.yml'

permissions:
  contents: read

jobs:
  lint:
    name: Lint Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: './package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint on core
        run: npm run lint --workspace=@nagiyu/share-together-core

      - name: Run ESLint on web
        run: npm run lint --workspace=@nagiyu/share-together-web

  format-check:
    name: Format Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: './package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Check core formatting
        run: npm run format:check --workspace=@nagiyu/share-together-core

      - name: Check web formatting
        run: npm run format:check --workspace=@nagiyu/share-together-web

  build-core:
    name: Build Core Package
    runs-on: ubuntu-latest
    needs: [lint, format-check]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: './package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Build shared libraries
        run: npm run build --workspace @nagiyu/common

      - name: Build core package
        run: npm run build --workspace=@nagiyu/share-together-core

  build-web:
    name: Build Web Package
    runs-on: ubuntu-latest
    needs: [build-core]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: './package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Build shared libraries
        run: |
          npm run build --workspace @nagiyu/common
          npm run build --workspace @nagiyu/browser
          npm run build --workspace @nagiyu/ui

      - name: Build core package
        run: npm run build --workspace=@nagiyu/share-together-core

      - name: Build web application
        run: npm run build --workspace=@nagiyu/share-together-web

  docker-build:
    name: Docker Build Web
    runs-on: ubuntu-latest
    needs: [build-web]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build web Docker image
        env:
          DOCKER_BUILDKIT: 0
        run: docker build -t share-together-web-verify-full-test -f services/share-together/web/Dockerfile .

  test-core:
    name: Core Unit Tests
    runs-on: ubuntu-latest
    needs: [build-core]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: './package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Build shared libraries
        run: npm run build --workspace @nagiyu/common

      - name: Build core package
        run: npm run build --workspace=@nagiyu/share-together-core

      - name: Run core tests
        run: npm run test --workspace=@nagiyu/share-together-core

      - name: Run web unit tests
        run: npm run test --workspace=@nagiyu/share-together-web

  coverage:
    name: Coverage Check (80% threshold)
    runs-on: ubuntu-latest
    needs: [build-core]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: './package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Build shared libraries
        run: npm run build --workspace @nagiyu/common

      - name: Build core package
        run: npm run build --workspace=@nagiyu/share-together-core

      - name: Run coverage check
        run: npm run test:coverage --workspace=@nagiyu/share-together-core

  e2e-test:
    name: E2E Tests (All Devices)
    runs-on: ubuntu-latest
    if: ${{ false }}
    needs: [build-web]

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: './package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Build shared libraries
        run: |
          npm run build --workspace @nagiyu/common
          npm run build --workspace @nagiyu/browser
          npm run build --workspace @nagiyu/ui

      - name: Build core package
        run: npm run build --workspace=@nagiyu/share-together-core

      - name: Build web application
        run: npm run build --workspace=@nagiyu/share-together-web

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium webkit
        working-directory: ./services/share-together/web

      - name: Run E2E tests (All Devices)
        env:
          CI: true
        run: npm run test:e2e --workspace=@nagiyu/share-together-web

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-full
          path: services/share-together/web/playwright-report/
          retention-days: 30

      - name: Upload test artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-full
          path: services/share-together/web/test-results/
          retention-days: 30

  synth-infra:
    name: Synthesize Infrastructure
    runs-on: ubuntu-latest
    needs: [lint, format-check]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: './package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Build common infrastructure package
        run: npm run build --workspace=@nagiyu/infra-common

      - name: Build infrastructure package
        run: npm run build --workspace=@nagiyu/infra

      - name: Synthesize CDK stack
        run: npm run synth --workspace=@nagiyu/infra -- --context env=dev

  report:
    name: Report Results to PR
    runs-on: ubuntu-latest
    if: always()
    needs:
      [
        lint,
        format-check,
        build-core,
        build-web,
        docker-build,
        test-core,
        coverage,
        e2e-test,
        synth-infra,
      ]

    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Create PR Comment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const results = {
              'Lint': '${{ needs.lint.result }}',
              'Format Check': '${{ needs.format-check.result }}',
              'Build Core': '${{ needs.build-core.result }}',
              'Build Web': '${{ needs.build-web.result }}',
              'Docker Build': '${{ needs.docker-build.result }}',
              'Core Unit Tests': '${{ needs.test-core.result }}',
              'Coverage (80%)': '${{ needs.coverage.result }}',
              'E2E Tests (Full)': '${{ needs.e2e-test.result }}',
              'Synthesize Infrastructure': '${{ needs.synth-infra.result }}'
            };

            const statusEmoji = {
              'success': '✅',
              'failure': '❌',
              'cancelled': '⚠️',
              'skipped': '⏭️'
            };

            const allSuccess = Object.values(results).every(r => r === 'success');
            const header = allSuccess
              ? '## ✅ All Full Checks Passed'
              : '## ❌ Some Full Checks Failed';

            let body = `${header}\n\n`;
            body += '**Share Together Web - Full Verification**\n\n';
            body += '| Job | Status |\n';
            body += '|-----|--------|\n';

            for (const [job, result] of Object.entries(results)) {
              const emoji = statusEmoji[result] || '❓';
              body += `| ${job} | ${emoji} ${result} |\n`;
            }

            body += `\n[View workflow run](${context.payload.repository.html_url}/actions/runs/${context.runId})`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
