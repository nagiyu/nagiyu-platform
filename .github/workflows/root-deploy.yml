name: Root Domain - CDK Deploy

# This workflow deploys CDK stacks for the root domain (nagiyu.com / dev.nagiyu.com)

on:
  push:
    branches:
      - develop
      - integration/**
      - master
    paths:
      - 'infra/bin/**'
      - 'infra/shared/vpc/**'
      - 'infra/root/**'
      - 'infra/package.json'
      - 'infra/cdk.json'
      - 'infra/tsconfig.json'
      - '.github/workflows/root-deploy.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        type: choice
        options:
          - dev
          - prod

env:
  AWS_REGION: us-east-1
  NODE_VERSION: '22'

permissions:
  contents: read
  id-token: write # Required for AWS OIDC authentication (future use)

jobs:
  cdk-synth:
    name: CDK Synth (Validation)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read

    outputs:
      environment: ${{ steps.setup-environment.outputs.environment }}
      stack-suffix: ${{ steps.setup-environment.outputs.stack-suffix }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup deployment environment
        id: setup-environment
        uses: ./.github/actions/setup-environment

      - name: Setup Node.js and install dependencies
        uses: ./.github/actions/setup-node
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache-dependency-path: './package-lock.json'

      - name: Build @nagiyu/infra-common
        run: npm run build --workspace=@nagiyu/infra-common

      - name: Build TypeScript
        run: npm run build --workspace=@nagiyu/infra

      - name: CDK Synth
        env:
          ENVIRONMENT: ${{ steps.setup-environment.outputs.environment }}
        run: npm run synth --workspace=@nagiyu/infra

      - name: Upload CloudFormation templates
        uses: actions/upload-artifact@v4
        with:
          name: cdk-templates
          path: infra/cdk.out/
          retention-days: 7

  cdk-deploy:
    name: CDK Deploy (All Stacks)
    runs-on: ubuntu-latest
    needs: cdk-synth
    permissions:
      contents: read
      id-token: write # Required for AWS credentials

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js and install dependencies
        uses: ./.github/actions/setup-node
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache-dependency-path: './package-lock.json'

      - name: Build @nagiyu/infra-common
        run: npm run build --workspace=@nagiyu/infra-common

      - name: Build TypeScript
        run: npm run build --workspace=@nagiyu/infra

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set ECR image tag
        id: get-image-tag
        run: |
          echo "::notice::Using latest tag for ECS deployment"
          echo "image-tag=latest" >> "$GITHUB_OUTPUT"

      - name: CDK Deploy
        env:
          ENVIRONMENT: ${{ needs.cdk-synth.outputs.environment }}
          IMAGE_TAG: ${{ steps.get-image-tag.outputs.image-tag }}
        run: npm run deploy --workspace=@nagiyu/infra -- --all --require-approval never

      - name: Display deployment summary
        env:
          ENVIRONMENT: ${{ needs.cdk-synth.outputs.environment }}
        run: |
          echo ""
          echo "=== CDK Deployment Complete ==="
          echo "Region: ${{ env.AWS_REGION }}"
          echo "Environment: $ENVIRONMENT"
          echo "Branch: ${{ github.ref_name }}"
          echo "Commit: ${{ github.sha }}"
          echo ""
          echo "All CDK stacks have been deployed successfully."
