name: Dev Sync - Verification

env:
  SERVICE_ID: dev-sync
  SERVICE_DISPLAY_NAME: Dev Sync

on:
  pull_request:
    branches:
      - integration/**
      - develop
    paths:
      - 'services/dev-sync/**'
      - 'infra/dev-sync/**'
      - 'libs/common/**'
      - 'libs/aws/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/dev-sync-verify.yml'

permissions:
  contents: read

jobs:
  lint:
    name: Lint Code
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js and install dependencies
        uses: ./.github/actions/setup-node
        with:
          node-version: '24'
          cache-dependency-path: './package-lock.json'

      - name: Run lint on Batch
        run: npm run lint --workspace @nagiyu/dev-sync-batch

  format-check:
    name: Format Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js and install dependencies
        uses: ./.github/actions/setup-node
        with:
          node-version: '24'
          cache-dependency-path: './package-lock.json'

      - name: Check formatting on Batch
        run: npm run format:check --workspace @nagiyu/dev-sync-batch

  unit-test-batch:
    name: Run Batch Unit Tests
    runs-on: ubuntu-latest
    needs: [lint, format-check]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js and install dependencies
        uses: ./.github/actions/setup-node
        with:
          node-version: '24'
          cache-dependency-path: './package-lock.json'

      - name: Build shared libraries
        run: |
          npm run build --workspace @nagiyu/common
          npm run build --workspace @nagiyu/aws

      - name: Run Batch tests
        run: npm run test --workspace @nagiyu/dev-sync-batch

  coverage:
    name: Test Coverage Check
    runs-on: ubuntu-latest
    needs: [lint, format-check]
    if: github.base_ref == 'develop'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js and install dependencies
        uses: ./.github/actions/setup-node
        with:
          node-version: '24'
          cache-dependency-path: './package-lock.json'

      - name: Build shared libraries
        run: |
          npm run build --workspace @nagiyu/common
          npm run build --workspace @nagiyu/aws

      - name: Run Batch tests with coverage
        run: npm run test:coverage --workspace @nagiyu/dev-sync-batch

  infra-test:
    name: Run Infrastructure Tests
    runs-on: ubuntu-latest
    needs: [lint, format-check]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js and install dependencies
        uses: ./.github/actions/setup-node
        with:
          node-version: '24'
          cache-dependency-path: './package-lock.json'

      - name: Build common infrastructure package
        run: npm run build --workspace=@nagiyu/infra-common

      - name: Run Infrastructure tests
        run: npm run test --workspace @nagiyu/infra-dev-sync

  cdk-synth:
    name: Synthesize Infrastructure
    runs-on: ubuntu-latest
    needs: [lint, format-check]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js and install dependencies
        uses: ./.github/actions/setup-node
        with:
          node-version: '24'
          cache-dependency-path: './package-lock.json'

      - name: Build common infrastructure package
        run: npm run build --workspace=@nagiyu/infra-common

      - name: Build CDK TypeScript
        run: npm run build --workspace=@nagiyu/infra-dev-sync

      - name: Synthesize CDK stack
        run: npm run synth --workspace=@nagiyu/infra-dev-sync -- --context env=dev

  docker-build:
    name: Docker Build Verification (Batch)
    runs-on: ubuntu-latest
    needs: [lint, format-check]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Build Docker image
        uses: ./.github/actions/build-docker-image
        with:
          dockerfile: services/dev-sync/batch/Dockerfile
          image-tag: dev-sync-batch-verify-full-test

  report:
    name: Report Results to PR
    runs-on: ubuntu-latest
    if: always()
    needs:
      [
        lint,
        format-check,
        unit-test-batch,
        coverage,
        infra-test,
        cdk-synth,
        docker-build,
      ]

    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Create PR Comment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const results = {
              'Lint': '${{ needs.lint.result }}',
              'Format Check': '${{ needs.format-check.result }}',
              'Batch Unit Tests': '${{ needs.unit-test-batch.result }}',
              'Coverage Check': '${{ needs.coverage.result }}',
              'Infrastructure Tests': '${{ needs.infra-test.result }}',
              'Synthesize Infrastructure': '${{ needs.cdk-synth.result }}',
              'Docker Build (Batch)': '${{ needs.docker-build.result }}'
            };

            const statusEmoji = {
              'success': '✅',
              'failure': '❌',
              'cancelled': '⚠️',
              'skipped': '⏭️'
            };

            const allSuccess = Object.values(results).every(r => r === 'success' || r === 'skipped');
            const isFull = context.payload.pull_request.base.ref === 'develop';
            const header = allSuccess
              ? (isFull ? '## ✅ [${{ env.SERVICE_DISPLAY_NAME }}] Full Verification Passed' : '## ✅ [${{ env.SERVICE_DISPLAY_NAME }}] Fast Verification Passed')
              : (isFull ? '## ❌ [${{ env.SERVICE_DISPLAY_NAME }}] Full Verification Failed' : '## ❌ [${{ env.SERVICE_DISPLAY_NAME }}] Fast Verification Failed');

            let body = `${header}\n\n`;
            body += isFull
              ? '**Full Verification (Coverage included)**\n\n'
              : '**Fast Verification**\n\n';
            body += '| Job | Status |\n';
            body += '|-----|--------|\n';

            for (const [job, result] of Object.entries(results)) {
              const emoji = statusEmoji[result] || '❓';
              body += `| ${job} | ${emoji} ${result} |\n`;
            }

            body += `\n[View workflow run](${context.payload.repository.html_url}/actions/runs/${context.runId})`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
