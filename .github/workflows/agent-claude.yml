name: Agent - Claude

on:
  issues:
    types: [labeled]
  issue_comment:
    types: [created]

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  run:
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'issues' && github.event.label.name == 'agent:claude') ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude'))
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: ブランチ・Draft PR 作成
        if: github.event_name == 'issues'
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
        run: |
          set -euo pipefail

          TARGET_BRANCH=$(gh issue view "$ISSUE_NUMBER" --json body -q '.body' | grep -oP '(?<=target-branch: )\S+' || echo 'develop')

          SLUG=$(echo "$ISSUE_TITLE" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]/-/g' | sed 's/-\+/-/g' | sed 's/^-\|-$//g' | cut -c1-40)
          BRANCH="feature/${ISSUE_NUMBER}-${SLUG}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout -b "$BRANCH"
          git commit --allow-empty -m "chore: start issue #${ISSUE_NUMBER}"
          git push origin "$BRANCH"

          gh pr create \
            --title "$ISSUE_TITLE" \
            --body "Closes #${ISSUE_NUMBER}" \
            --base "$TARGET_BRANCH" \
            --head "$BRANCH" \
            --draft

          echo "BRANCH=$BRANCH" >> "$GITHUB_ENV"

      - name: フェーズ判別
        if: github.event_name == 'issues'
        id: detect-phase
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
        run: |
          if echo "$ISSUE_TITLE" | grep -q 'タスクドキュメント'; then
            AGENT_FILE=".github/agents/task.proposal.agent.md"
          elif echo "$ISSUE_TITLE" | grep -q 'クリーンアップ'; then
            AGENT_FILE=".github/agents/docs.write.agent.md"
          else
            AGENT_FILE=".github/agents/task.implement.agent.md"
          fi
          echo "agent_file=${AGENT_FILE}" >> "$GITHUB_OUTPUT"

      - name: ブランチをチェックアウト（Issue ラベルトリガー時）
        if: github.event_name == 'issues'
        run: git checkout "$BRANCH"

      - name: Claude を起動（Issue ラベルトリガー）
        if: github.event_name == 'issues'
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ github.token }}
          label_trigger: 'agent:claude'
          claude_args: '--allowedTools Bash,Read,Edit,Write'
          prompt: |
            ${{ steps.detect-phase.outputs.agent_file }} に記載されているエージェント指示を読み込み、その内容に従って対象の Issue を処理してください。
            対象エージェント指示ファイル: ${{ steps.detect-phase.outputs.agent_file }}

      - name: Claude を起動（コメントトリガー）
        if: github.event_name == 'issue_comment'
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ github.token }}
          trigger_phrase: '@claude'
          claude_args: '--allowedTools Bash,Read,Edit,Write'

      - name: 実行ログをアーティファクトとして保存
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: claude-execution-log-${{ github.run_id }}
          path: /home/runner/work/_temp/claude-execution-output.json
          if-no-files-found: ignore
