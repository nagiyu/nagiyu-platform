name: Share Together - Verification

on:
  pull_request:
    branches:
      - develop
      - integration/**
    paths:
      - 'services/share-together/**'
      - 'infra/share-together/**'
      - 'libs/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/share-together-verify.yml'

permissions:
  contents: read

jobs:
  lint:
    name: Lint Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js and install dependencies
        uses: ./.github/actions/setup-node
        with:
          node-version: '22'
          cache-dependency-path: './package-lock.json'

      - name: Run ESLint on core
        run: npm run lint --workspace=@nagiyu/share-together-core

      - name: Run ESLint on web
        run: npm run lint --workspace=@nagiyu/share-together-web

  format-check:
    name: Format Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js and install dependencies
        uses: ./.github/actions/setup-node
        with:
          node-version: '22'
          cache-dependency-path: './package-lock.json'

      - name: Check core formatting
        run: npm run format:check --workspace=@nagiyu/share-together-core

      - name: Check web formatting
        run: npm run format:check --workspace=@nagiyu/share-together-web

  build-core:
    name: Build Core Package
    runs-on: ubuntu-latest
    needs: [lint, format-check]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js and install dependencies
        uses: ./.github/actions/setup-node
        with:
          node-version: '22'
          cache-dependency-path: './package-lock.json'

      - name: Build shared libraries
        uses: ./.github/actions/build-shared-workspaces
        with:
          shared-workspaces: '@nagiyu/common,@nagiyu/aws'

      - name: Build core package
        run: npm run build --workspace=@nagiyu/share-together-core

  build-web:
    name: Build Web Package
    runs-on: ubuntu-latest
    needs: [build-core]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build web application
        uses: ./.github/actions/build-web-app
        with:
          workspace: '@nagiyu/share-together-web'
          shared-workspaces: '@nagiyu/common,@nagiyu/browser,@nagiyu/ui,@nagiyu/nextjs,@nagiyu/aws,@nagiyu/share-together-core'

  docker-build:
    name: Docker Build Web
    runs-on: ubuntu-latest
    needs: [build-web]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version from package.json
        id: get-version
        working-directory: ./services/share-together/web
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "app-version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Build web Docker image
        uses: ./.github/actions/build-docker-image
        with:
          dockerfile: services/share-together/web/Dockerfile
          image-tag: share-together-web-verify-test
          app-version: ${{ steps.get-version.outputs.app-version }}

  test-core:
    name: Core Unit Tests
    runs-on: ubuntu-latest
    needs: [build-core]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js and install dependencies
        uses: ./.github/actions/setup-node
        with:
          node-version: '22'
          cache-dependency-path: './package-lock.json'

      - name: Build shared libraries
        uses: ./.github/actions/build-shared-workspaces
        with:
          shared-workspaces: '@nagiyu/common,@nagiyu/aws'

      - name: Build core package
        run: npm run build --workspace=@nagiyu/share-together-core

      - name: Run core tests
        run: npm run test --workspace=@nagiyu/share-together-core

  test-web:
    name: Web Unit Tests
    runs-on: ubuntu-latest
    needs: [build-web]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js and install dependencies
        uses: ./.github/actions/setup-node
        with:
          node-version: '22'
          cache-dependency-path: './package-lock.json'

      - name: Build shared libraries
        uses: ./.github/actions/build-shared-workspaces
        with:
          shared-workspaces: '@nagiyu/common,@nagiyu/browser,@nagiyu/ui,@nagiyu/nextjs,@nagiyu/aws'

      - name: Build core package
        run: npm run build --workspace=@nagiyu/share-together-core

      - name: Run web unit tests
        run: npm run test --workspace=@nagiyu/share-together-web

  coverage:
    name: Coverage Check (80% threshold)
    runs-on: ubuntu-latest
    needs: [build-core]
    if: github.base_ref == 'develop'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js and install dependencies
        uses: ./.github/actions/setup-node
        with:
          node-version: '22'
          cache-dependency-path: './package-lock.json'

      - name: Build shared libraries
        uses: ./.github/actions/build-shared-workspaces
        with:
          shared-workspaces: '@nagiyu/common,@nagiyu/aws'

      - name: Build core package
        run: npm run build --workspace=@nagiyu/share-together-core

      - name: Run coverage check
        run: npm run test:coverage --workspace=@nagiyu/share-together-core

  e2e-test-web-chromium-mobile:
    name: E2E Tests (chromium-mobile)
    runs-on: ubuntu-latest
    needs: [build-web]

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js and install dependencies
        uses: ./.github/actions/setup-node
        with:
          node-version: '22'
          cache-dependency-path: './package-lock.json'

      - name: Build shared libraries
        uses: ./.github/actions/build-shared-workspaces
        with:
          shared-workspaces: '@nagiyu/common,@nagiyu/browser,@nagiyu/ui,@nagiyu/nextjs,@nagiyu/aws'

      - name: Build core package
        run: npm run build --workspace=@nagiyu/share-together-core

      - name: Build web application
        run: npm run build --workspace=@nagiyu/share-together-web

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium
        working-directory: ./services/share-together/web

      - name: Run E2E tests (chromium-mobile)
        env:
          CI: true
          SKIP_AUTH_CHECK: true
          AUTH_SECRET: test-secret-for-e2e
          NEXTAUTH_SECRET: test-secret-for-e2e
        run: npm run test:e2e --workspace=@nagiyu/share-together-web -- --project=chromium-mobile

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-chromium-mobile
          path: services/share-together/web/playwright-report/
          retention-days: 30

      - name: Upload test artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-chromium-mobile
          path: services/share-together/web/test-results/
          retention-days: 30

  e2e-test-web-chromium-desktop:
    name: E2E Tests (chromium-desktop)
    runs-on: ubuntu-latest
    needs: [build-web]
    if: github.base_ref == 'develop'

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js and install dependencies
        uses: ./.github/actions/setup-node
        with:
          node-version: '22'
          cache-dependency-path: './package-lock.json'

      - name: Build shared libraries
        uses: ./.github/actions/build-shared-workspaces
        with:
          shared-workspaces: '@nagiyu/common,@nagiyu/browser,@nagiyu/ui,@nagiyu/nextjs,@nagiyu/aws'

      - name: Build core package
        run: npm run build --workspace=@nagiyu/share-together-core

      - name: Build web application
        run: npm run build --workspace=@nagiyu/share-together-web

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium
        working-directory: ./services/share-together/web

      - name: Run E2E tests (chromium-desktop)
        env:
          CI: true
          SKIP_AUTH_CHECK: true
          AUTH_SECRET: test-secret-for-e2e
          NEXTAUTH_SECRET: test-secret-for-e2e
        run: npm run test:e2e --workspace=@nagiyu/share-together-web -- --project=chromium-desktop

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-chromium-desktop
          path: services/share-together/web/playwright-report/
          retention-days: 30

      - name: Upload test artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-chromium-desktop
          path: services/share-together/web/test-results/
          retention-days: 30

  e2e-test-web-webkit-mobile:
    name: E2E Tests (webkit-mobile)
    runs-on: ubuntu-latest
    needs: [build-web]
    if: github.base_ref == 'develop'

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js and install dependencies
        uses: ./.github/actions/setup-node
        with:
          node-version: '22'
          cache-dependency-path: './package-lock.json'

      - name: Build shared libraries
        uses: ./.github/actions/build-shared-workspaces
        with:
          shared-workspaces: '@nagiyu/common,@nagiyu/browser,@nagiyu/ui,@nagiyu/nextjs,@nagiyu/aws'

      - name: Build core package
        run: npm run build --workspace=@nagiyu/share-together-core

      - name: Build web application
        run: npm run build --workspace=@nagiyu/share-together-web

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps webkit
        working-directory: ./services/share-together/web

      - name: Run E2E tests (webkit-mobile)
        env:
          CI: true
          SKIP_AUTH_CHECK: true
          AUTH_SECRET: test-secret-for-e2e
          NEXTAUTH_SECRET: test-secret-for-e2e
        run: npm run test:e2e --workspace=@nagiyu/share-together-web -- --project=webkit-mobile

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-webkit-mobile
          path: services/share-together/web/playwright-report/
          retention-days: 30

      - name: Upload test artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-webkit-mobile
          path: services/share-together/web/test-results/
          retention-days: 30

  synth-infra:
    name: Synthesize Infrastructure
    runs-on: ubuntu-latest
    needs: [lint, format-check]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js and install dependencies
        uses: ./.github/actions/setup-node
        with:
          node-version: '22'
          cache-dependency-path: './package-lock.json'

      - name: Build common infrastructure package
        run: npm run build --workspace=@nagiyu/infra-common

      - name: Build infrastructure package
        run: npm run build --workspace=@nagiyu/infra

      - name: Synthesize CDK stack
        run: npm run synth --workspace=@nagiyu/infra -- --context env=dev

  report:
    name: Report Results to PR
    runs-on: ubuntu-latest
    if: always()
    needs:
      [
        lint,
        format-check,
        build-core,
        build-web,
        docker-build,
        test-core,
        test-web,
        coverage,
        e2e-test-web-chromium-mobile,
        e2e-test-web-chromium-desktop,
        e2e-test-web-webkit-mobile,
        synth-infra,
      ]

    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Create PR Comment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const results = {
              'Lint': '${{ needs.lint.result }}',
              'Format Check': '${{ needs.format-check.result }}',
              'Build Core': '${{ needs.build-core.result }}',
              'Build Web': '${{ needs.build-web.result }}',
              'Docker Build': '${{ needs.docker-build.result }}',
              'Core Unit Tests': '${{ needs.test-core.result }}',
              'Web Unit Tests': '${{ needs.test-web.result }}',
              'Coverage (80%)': '${{ needs.coverage.result }}',
              'E2E Tests (chromium-mobile)': '${{ needs.e2e-test-web-chromium-mobile.result }}',
              'E2E Tests (chromium-desktop)': '${{ needs.e2e-test-web-chromium-desktop.result }}',
              'E2E Tests (webkit-mobile)': '${{ needs.e2e-test-web-webkit-mobile.result }}',
              'Synthesize Infrastructure': '${{ needs.synth-infra.result }}'
            };

            const isFullVerification = '${{ github.base_ref }}' === 'develop';

            const statusEmoji = {
              'success': '✅',
              'failure': '❌',
              'cancelled': '⚠️',
              'skipped': '⏭️'
            };

            const allSuccess = Object.values(results).every((result) =>
              isFullVerification ? result === 'success' : result === 'success' || result === 'skipped'
            );
            const header = allSuccess
              ? isFullVerification
                ? '## ✅ All Full Checks Passed'
                : '## ✅ All Fast Checks Passed'
              : isFullVerification
                ? '## ❌ Some Full Checks Failed'
                : '## ❌ Some Fast Checks Failed';

            let body = `${header}\n\n`;
            body += isFullVerification
              ? '**Share Together - Full Verification**\n\n'
              : '**Share Together - Fast Verification**\n\n';
            body += '| Job | Status |\n';
            body += '|-----|--------|\n';

            for (const [job, result] of Object.entries(results)) {
              const emoji = statusEmoji[result] || '❓';
              body += `| ${job} | ${emoji} ${result} |\n`;
            }

            body += `\n[View workflow run](${context.payload.repository.html_url}/actions/runs/${context.runId})`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
