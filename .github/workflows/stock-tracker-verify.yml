name: Stock Tracker - Verification

on:
  pull_request:
    branches:
      - integration/**
      - develop
    paths:
      - 'services/stock-tracker/**'
      - 'libs/**'
      - 'infra/stock-tracker/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/stock-tracker-verify.yml'

permissions:
  contents: read

jobs:
  build-web:
    name: Web Build Verification
    runs-on: ubuntu-latest
    needs: [build-core]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Web application
        uses: ./.github/actions/build-web-app
        with:
          workspace: '@nagiyu/stock-tracker-web'
          shared-workspaces: '@nagiyu/common,@nagiyu/aws,@nagiyu/nextjs,@nagiyu/react,@nagiyu/browser,@nagiyu/ui,@nagiyu/stock-tracker-core'

  build-core:
    name: Core Build Verification
    runs-on: ubuntu-latest
    needs: [lint, format-check]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js and install dependencies
        uses: ./.github/actions/setup-node
        with:
          node-version: '24'
          cache-dependency-path: './package-lock.json'

      - name: Build shared libraries
        run: |
          npm run build --workspace @nagiyu/common
          npm run build --workspace @nagiyu/aws

      - name: Build Core package
        run: npm run build --workspace @nagiyu/stock-tracker-core

  build-batch:
    name: Batch Build Verification
    runs-on: ubuntu-latest
    needs: [build-core]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js and install dependencies
        uses: ./.github/actions/setup-node
        with:
          node-version: '24'
          cache-dependency-path: './package-lock.json'

      - name: Build shared libraries
        run: |
          npm run build --workspace @nagiyu/common
          npm run build --workspace @nagiyu/aws

      - name: Build core package
        run: npm run build --workspace @nagiyu/stock-tracker-core

      - name: Build Batch application
        run: npm run build --workspace @nagiyu/stock-tracker-batch

  build-infra:
    name: Infrastructure Build Verification
    runs-on: ubuntu-latest
    needs: [synth-infra]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js and install dependencies
        uses: ./.github/actions/setup-node
        with:
          node-version: '24'
          cache-dependency-path: './package-lock.json'

      - name: Build common infrastructure package
        run: npm run build --workspace=@nagiyu/infra-common

      - name: Build CDK TypeScript
        run: npm run build --workspace=@nagiyu/infra-stock-tracker

  docker-build-web:
    name: Docker Build Verification (Web)
    runs-on: ubuntu-latest
    needs: [build-web]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version from package.json
        id: get-version
        working-directory: ./services/stock-tracker/web
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "app-version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Build Docker image
        uses: ./.github/actions/build-docker-image
        with:
          dockerfile: services/stock-tracker/web/Dockerfile
          image-tag: stock-tracker-web-verify-full-test
          app-version: ${{ steps.get-version.outputs.app-version }}

  docker-build-batch:
    name: Docker Build Verification (Batch)
    runs-on: ubuntu-latest
    needs: [build-batch]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version from package.json
        id: get-version
        working-directory: ./services/stock-tracker/batch
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "app-version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Build Docker image
        uses: ./.github/actions/build-docker-image
        with:
          dockerfile: services/stock-tracker/batch/Dockerfile
          image-tag: stock-tracker-batch-verify-full-test
          app-version: ${{ steps.get-version.outputs.app-version }}

  test-web:
    name: Run Web Unit Tests
    runs-on: ubuntu-latest
    needs: [build-web]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js and install dependencies
        uses: ./.github/actions/setup-node
        with:
          node-version: '24'
          cache-dependency-path: './package-lock.json'

      - name: Build shared libraries
        run: |
          npm run build --workspace @nagiyu/common
          npm run build --workspace @nagiyu/aws
          npm run build --workspace @nagiyu/nextjs
          npm run build --workspace @nagiyu/react
          npm run build --workspace @nagiyu/browser
          npm run build --workspace @nagiyu/ui

      - name: Build core package
        run: npm run build --workspace @nagiyu/stock-tracker-core

      - name: Run Web tests
        run: npm run test --workspace @nagiyu/stock-tracker-web

  test-core:
    name: Run Core Unit Tests
    runs-on: ubuntu-latest
    needs: [build-core]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js and install dependencies
        uses: ./.github/actions/setup-node
        with:
          node-version: '24'
          cache-dependency-path: './package-lock.json'

      - name: Build shared libraries
        run: |
          npm run build --workspace @nagiyu/common
          npm run build --workspace @nagiyu/aws

      - name: Run Core tests
        run: npm run test --workspace @nagiyu/stock-tracker-core

  test-batch:
    name: Run Batch Unit Tests
    runs-on: ubuntu-latest
    needs: [build-batch]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js and install dependencies
        uses: ./.github/actions/setup-node
        with:
          node-version: '24'
          cache-dependency-path: './package-lock.json'

      - name: Build shared libraries
        run: |
          npm run build --workspace @nagiyu/common
          npm run build --workspace @nagiyu/aws

      - name: Build core package
        run: npm run build --workspace @nagiyu/stock-tracker-core

      - name: Run Batch tests
        run: npm run test --workspace @nagiyu/stock-tracker-batch

  coverage:
    name: Test Coverage Check
    runs-on: ubuntu-latest
    needs: [build-core]
    if: github.base_ref == 'develop'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js and install dependencies
        uses: ./.github/actions/setup-node
        with:
          node-version: '24'
          cache-dependency-path: './package-lock.json'

      - name: Build shared libraries
        run: |
          npm run build --workspace @nagiyu/common
          npm run build --workspace @nagiyu/aws

      - name: Run Core tests with coverage
        run: npm run test:coverage --workspace @nagiyu/stock-tracker-core

  e2e-test-web-chromium-mobile:
    name: Run E2E Tests Web (chromium-mobile)
    runs-on: ubuntu-latest
    needs: [build-web]

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js and install dependencies
        uses: ./.github/actions/setup-node
        with:
          node-version: '24'
          cache-dependency-path: './package-lock.json'

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Fetch dev IAM credentials from Secrets Manager
        id: fetch-dev-credentials
        uses: aws-actions/aws-secretsmanager-get-secrets@v2
        with:
          secret-ids: |
            DEV_CREDENTIALS,nagiyu-stock-tracker-dev-credentials-dev
          parse-json-secrets: true

      - name: Build shared libraries
        run: |
          npm run build --workspace @nagiyu/common
          npm run build --workspace @nagiyu/aws
          npm run build --workspace @nagiyu/nextjs
          npm run build --workspace @nagiyu/react
          npm run build --workspace @nagiyu/browser
          npm run build --workspace @nagiyu/ui

      - name: Build core package
        run: npm run build --workspace @nagiyu/stock-tracker-core

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium
        working-directory: ./services/stock-tracker/web

      - name: Run Playwright tests (chromium-mobile)
        env:
          CI: true
          PROJECT: chromium-mobile
          AWS_ACCESS_KEY_ID: ${{ env.DEV_CREDENTIALS_ACCESSKEYID }}
          AWS_SECRET_ACCESS_KEY: ${{ env.DEV_CREDENTIALS_SECRETACCESSKEY }}
          AWS_REGION: us-east-1
        run: |
          npm run test:e2e --workspace @nagiyu/stock-tracker-web
          if [ $? -ne 0 ]; then
            echo "E2E tests failed"
            exit 1
          fi

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-full-chromium-mobile
          path: services/stock-tracker/web/playwright-report/
          retention-days: 30

      - name: Upload test artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-full-chromium-mobile
          path: services/stock-tracker/web/test-results/
          retention-days: 30

  e2e-test-web-chromium-desktop:
    name: Run E2E Tests Web (chromium-desktop)
    runs-on: ubuntu-latest
    needs: [build-web]
    if: github.base_ref == 'develop'

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js and install dependencies
        uses: ./.github/actions/setup-node
        with:
          node-version: '24'
          cache-dependency-path: './package-lock.json'

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Fetch dev IAM credentials from Secrets Manager
        id: fetch-dev-credentials
        uses: aws-actions/aws-secretsmanager-get-secrets@v2
        with:
          secret-ids: |
            DEV_CREDENTIALS,nagiyu-stock-tracker-dev-credentials-dev
          parse-json-secrets: true

      - name: Build shared libraries
        run: |
          npm run build --workspace @nagiyu/common
          npm run build --workspace @nagiyu/aws
          npm run build --workspace @nagiyu/nextjs
          npm run build --workspace @nagiyu/react
          npm run build --workspace @nagiyu/browser
          npm run build --workspace @nagiyu/ui

      - name: Build core package
        run: npm run build --workspace @nagiyu/stock-tracker-core

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium
        working-directory: ./services/stock-tracker/web

      - name: Run Playwright tests (chromium-desktop)
        env:
          CI: true
          PROJECT: chromium-desktop
          AWS_ACCESS_KEY_ID: ${{ env.DEV_CREDENTIALS_ACCESSKEYID }}
          AWS_SECRET_ACCESS_KEY: ${{ env.DEV_CREDENTIALS_SECRETACCESSKEY }}
          AWS_REGION: us-east-1
        run: |
          npm run test:e2e --workspace @nagiyu/stock-tracker-web
          if [ $? -ne 0 ]; then
            echo "E2E tests failed"
            exit 1
          fi

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-full-chromium-desktop
          path: services/stock-tracker/web/playwright-report/
          retention-days: 30

      - name: Upload test artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-full-chromium-desktop
          path: services/stock-tracker/web/test-results/
          retention-days: 30

  e2e-test-web-webkit-mobile:
    name: Run E2E Tests Web (webkit-mobile)
    runs-on: ubuntu-latest
    needs: [build-web]
    if: github.base_ref == 'develop'

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js and install dependencies
        uses: ./.github/actions/setup-node
        with:
          node-version: '24'
          cache-dependency-path: './package-lock.json'

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Fetch dev IAM credentials from Secrets Manager
        id: fetch-dev-credentials
        uses: aws-actions/aws-secretsmanager-get-secrets@v2
        with:
          secret-ids: |
            DEV_CREDENTIALS,nagiyu-stock-tracker-dev-credentials-dev
          parse-json-secrets: true

      - name: Build shared libraries
        run: |
          npm run build --workspace @nagiyu/common
          npm run build --workspace @nagiyu/aws
          npm run build --workspace @nagiyu/nextjs
          npm run build --workspace @nagiyu/react
          npm run build --workspace @nagiyu/browser
          npm run build --workspace @nagiyu/ui

      - name: Build core package
        run: npm run build --workspace @nagiyu/stock-tracker-core

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps webkit
        working-directory: ./services/stock-tracker/web

      - name: Run Playwright tests (webkit-mobile)
        env:
          CI: true
          PROJECT: webkit-mobile
          AWS_ACCESS_KEY_ID: ${{ env.DEV_CREDENTIALS_ACCESSKEYID }}
          AWS_SECRET_ACCESS_KEY: ${{ env.DEV_CREDENTIALS_SECRETACCESSKEY }}
          AWS_REGION: us-east-1
        run: |
          npm run test:e2e --workspace @nagiyu/stock-tracker-web
          if [ $? -ne 0 ]; then
            echo "E2E tests failed"
            exit 1
          fi

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-full-webkit-mobile
          path: services/stock-tracker/web/playwright-report/
          retention-days: 30

      - name: Upload test artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-full-webkit-mobile
          path: services/stock-tracker/web/test-results/
          retention-days: 30

  lint:
    name: Lint Code
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js and install dependencies
        uses: ./.github/actions/setup-node
        with:
          node-version: '24'
          cache-dependency-path: './package-lock.json'

      - name: Run lint on Core
        run: npm run lint --workspace @nagiyu/stock-tracker-core

      - name: Run lint on Batch
        run: npm run lint --workspace @nagiyu/stock-tracker-batch

      - name: Run lint on Web
        run: npm run lint --workspace @nagiyu/stock-tracker-web

  format-check:
    name: Format Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js and install dependencies
        uses: ./.github/actions/setup-node
        with:
          node-version: '24'
          cache-dependency-path: './package-lock.json'

      - name: Check formatting on Core
        run: npm run format:check --workspace @nagiyu/stock-tracker-core

      - name: Check formatting on Batch
        run: npm run format:check --workspace @nagiyu/stock-tracker-batch

      - name: Check formatting on Web
        run: npm run format:check --workspace @nagiyu/stock-tracker-web

  synth-infra:
    name: Synthesize Infrastructure
    runs-on: ubuntu-latest
    needs: [lint, format-check]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js and install dependencies
        uses: ./.github/actions/setup-node
        with:
          node-version: '24'
          cache-dependency-path: './package-lock.json'

      - name: Build common infrastructure package
        run: npm run build --workspace=@nagiyu/infra-common

      - name: Build CDK TypeScript
        run: npm run build --workspace=@nagiyu/infra-stock-tracker

      - name: Synthesize CDK stack
        run: npm run synth --workspace=@nagiyu/infra-stock-tracker -- --context env=dev

  report:
    name: Report Results to PR
    runs-on: ubuntu-latest
    if: always()
    needs:
      [
        build-web,
        build-core,
        build-batch,
        build-infra,
        docker-build-web,
        docker-build-batch,
        test-web,
        test-core,
        test-batch,
        coverage,
        e2e-test-web-chromium-mobile,
        e2e-test-web-chromium-desktop,
        e2e-test-web-webkit-mobile,
        lint,
        format-check,
        synth-infra,
      ]

    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Create PR Comment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const results = {
              'Web Build': '${{ needs.build-web.result }}',
              'Core Build': '${{ needs.build-core.result }}',
              'Batch Build': '${{ needs.build-batch.result }}',
              'Infrastructure Build': '${{ needs.build-infra.result }}',
              'Docker Build (Web)': '${{ needs.docker-build-web.result }}',
              'Docker Build (Batch)': '${{ needs.docker-build-batch.result }}',
              'Web Unit Tests': '${{ needs.test-web.result }}',
              'Core Unit Tests': '${{ needs.test-core.result }}',
              'Batch Unit Tests': '${{ needs.test-batch.result }}',
              'Coverage Check': '${{ needs.coverage.result }}',
              'E2E Tests Web (chromium-mobile)': '${{ needs.e2e-test-web-chromium-mobile.result }}',
              'E2E Tests Web (chromium-desktop)': '${{ needs.e2e-test-web-chromium-desktop.result }}',
              'E2E Tests Web (webkit-mobile)': '${{ needs.e2e-test-web-webkit-mobile.result }}',
              'Lint': '${{ needs.lint.result }}',
              'Format Check': '${{ needs.format-check.result }}',
              'Synthesize Infrastructure': '${{ needs.synth-infra.result }}'
            };

            const statusEmoji = {
              'success': '✅',
              'failure': '❌',
              'cancelled': '⚠️',
              'skipped': '⏭️'
            };

            const allSuccess = Object.values(results).every(r => r === 'success' || r === 'skipped');
            const isFull = github.base_ref === 'develop';
            const header = allSuccess
              ? (isFull ? '## ✅ All Full Checks Passed' : '## ✅ All Fast Checks Passed')
              : (isFull ? '## ❌ Some Full Checks Failed' : '## ❌ Some Fast Checks Failed');

            let body = `${header}\n\n`;
            body += isFull
              ? '**Full Verification (All devices + Coverage)**\n\n'
              : '**Fast Verification (chromium-mobile only)**\n\n';
            body += '| Job | Status |\n';
            body += '|-----|--------|\n';

            for (const [job, result] of Object.entries(results)) {
              const emoji = statusEmoji[result] || '❓';
              body += `| ${job} | ${emoji} ${result} |\n`;
            }

            body += `\n[View workflow run](${context.payload.repository.html_url}/actions/runs/${context.runId})`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
