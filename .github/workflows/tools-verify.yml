name: Tools App - Verification

on:
  pull_request:
    branches:
      - integration/**
      - develop
    paths:
      - 'services/tools/**'
      - 'libs/**'
      - 'infra/tools/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/tools-verify.yml'

permissions:
  contents: read

jobs:
  nextjs-build:
    name: Next.js Build Verification
    runs-on: ubuntu-latest
    needs: [lint, format-check]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: './package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Build shared libraries
        run: |
          npm run build --workspace @nagiyu/common
          npm run build --workspace @nagiyu/browser
          npm run build --workspace @nagiyu/ui

      - name: Build Next.js application
        run: npm run build --workspace tools

  docker-build:
    name: Docker Build Verification
    runs-on: ubuntu-latest
    needs: [nextjs-build]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        env:
          DOCKER_BUILDKIT: 0
        run: docker build -t tools-verify-full-test -f services/tools/Dockerfile .

  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    needs: [nextjs-build]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: './package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test --workspace tools

  coverage:
    name: Test Coverage Check
    runs-on: ubuntu-latest
    needs: [test]
    if: github.base_ref == 'develop'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: './package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm run test:coverage --workspace tools

  e2e-test-chromium-mobile:
    name: Run E2E Tests (chromium-mobile)
    runs-on: ubuntu-latest
    needs: [test]

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: './package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Build shared libraries
        run: |
          npm run build --workspace @nagiyu/common
          npm run build --workspace @nagiyu/browser
          npm run build --workspace @nagiyu/ui

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium
        working-directory: ./services/tools

      - name: Run Playwright tests (chromium-mobile)
        env:
          CI: true
          PROJECT: chromium-mobile
        run: |
          npm run test:e2e --workspace tools
          if [ $? -ne 0 ]; then
            echo "E2E tests failed"
            exit 1
          fi

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-full-chromium-mobile
          path: services/tools/playwright-report/
          retention-days: 30

      - name: Upload test artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-full-chromium-mobile
          path: services/tools/test-results/
          retention-days: 30

  e2e-test-chromium-desktop:
    name: Run E2E Tests (chromium-desktop)
    runs-on: ubuntu-latest
    needs: [test]
    if: github.base_ref == 'develop'

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: './package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Build shared libraries
        run: |
          npm run build --workspace @nagiyu/common
          npm run build --workspace @nagiyu/browser
          npm run build --workspace @nagiyu/ui

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium
        working-directory: ./services/tools

      - name: Run Playwright tests (chromium-desktop)
        env:
          CI: true
          PROJECT: chromium-desktop
        run: |
          npm run test:e2e --workspace tools
          if [ $? -ne 0 ]; then
            echo "E2E tests failed"
            exit 1
          fi

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-full-chromium-desktop
          path: services/tools/playwright-report/
          retention-days: 30

      - name: Upload test artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-full-chromium-desktop
          path: services/tools/test-results/
          retention-days: 30

  e2e-test-webkit-mobile:
    name: Run E2E Tests (webkit-mobile)
    runs-on: ubuntu-latest
    needs: [test]
    if: github.base_ref == 'develop'

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: './package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Build shared libraries
        run: |
          npm run build --workspace @nagiyu/common
          npm run build --workspace @nagiyu/browser
          npm run build --workspace @nagiyu/ui

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps webkit
        working-directory: ./services/tools

      - name: Run Playwright tests (webkit-mobile)
        env:
          CI: true
          PROJECT: webkit-mobile
        run: |
          npm run test:e2e --workspace tools
          if [ $? -ne 0 ]; then
            echo "E2E tests failed"
            exit 1
          fi

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-full-webkit-mobile
          path: services/tools/playwright-report/
          retention-days: 30

      - name: Upload test artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-full-webkit-mobile
          path: services/tools/test-results/
          retention-days: 30

  lint:
    name: Lint Code
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: './package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint --workspace tools

  format-check:
    name: Format Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: './package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format:check --workspace tools

  report:
    name: Report Results to PR
    runs-on: ubuntu-latest
    if: always()
    needs:
      [
        nextjs-build,
        docker-build,
        test,
        coverage,
        e2e-test-chromium-mobile,
        e2e-test-chromium-desktop,
        e2e-test-webkit-mobile,
        lint,
        format-check,
      ]

    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Create PR Comment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const results = {
              'Next.js Build': '${{ needs.nextjs-build.result }}',
              'Docker Build': '${{ needs.docker-build.result }}',
              'Unit Tests': '${{ needs.test.result }}',
              'Coverage Check': '${{ needs.coverage.result }}',
               'E2E Tests (chromium-mobile)': '${{ needs.e2e-test-chromium-mobile.result }}',
               'E2E Tests (chromium-desktop)': '${{ needs.e2e-test-chromium-desktop.result }}',
               'E2E Tests (webkit-mobile)': '${{ needs.e2e-test-webkit-mobile.result }}',
              'Lint': '${{ needs.lint.result }}',
              'Format Check': '${{ needs.format-check.result }}'
            };

            const statusEmoji = {
              'success': '✅',
              'failure': '❌',
              'cancelled': '⚠️',
              'skipped': '⏭️'
            };

            const allSuccess = Object.values(results).every(r => r === 'success' || r === 'skipped');
            const isFull = github.base_ref === 'develop';
            const header = allSuccess
              ? (isFull ? '## ✅ All Full Checks Passed' : '## ✅ All Fast Checks Passed')
              : (isFull ? '## ❌ Some Full Checks Failed' : '## ❌ Some Fast Checks Failed');

            let body = `${header}\n\n`;
            body += isFull
              ? '**Full Verification (All devices + Coverage)**\n\n'
              : '**Fast Verification (chromium-mobile only)**\n\n';
            body += '| Job | Status |\n';
            body += '|-----|--------|\n';

            for (const [job, result] of Object.entries(results)) {
              const emoji = statusEmoji[result] || '❓';
              body += `| ${job} | ${emoji} ${result} |\n`;
            }

            body += `\n[View workflow run](${context.payload.repository.html_url}/actions/runs/${context.runId})`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
