name: Codec Converter - Deploy Infrastructure

on:
  push:
    branches:
      - develop
      - integration/**
      - master
    paths:
      - 'services/codec-converter/**'
      - 'infra/codec-converter/**'
      - 'libs/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/codec-converter-deploy.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        type: choice
        options:
          - dev
          - prod

env:
  AWS_REGION: us-east-1

jobs:
  prepare-infrastructure:
    name: Prepare Infrastructure
    runs-on: ubuntu-latest

    permissions:
      contents: read

    outputs:
      environment: ${{ steps.setup-environment.outputs.environment }}
      stack-name: ${{ steps.setup-environment.outputs.stack-name }}
      ecr-registry: ${{ steps.login-ecr.outputs.registry }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup deployment environment
        id: setup-environment
        uses: ./.github/actions/setup-environment
        with:
          stack-name-prefix: NagiyuCodecConverter

      - name: Setup Node.js and install dependencies
        uses: ./.github/actions/setup-node
        with:
          node-version: '22'
          cache-dependency-path: './package-lock.json'

      - name: Build common infrastructure package
        run: npm run build --workspace=@nagiyu/infra-common

      - name: Build CDK project
        run: npm run build --workspace=codec-converter

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get AWS Account ID
        id: get-account-id
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "account-id=$ACCOUNT_ID" >> "$GITHUB_OUTPUT"
          echo "AWS Account ID: $ACCOUNT_ID"

      - name: CDK Bootstrap (if needed)
        env:
          ACCOUNT_ID: ${{ steps.get-account-id.outputs.account-id }}
        run: |
          # Bootstrap is idempotent - safe to run on every deployment
          npm run bootstrap --workspace=codec-converter -- aws://$ACCOUNT_ID/${{ env.AWS_REGION }} \
            --context env=${{ steps.setup-environment.outputs.environment }}

      - name: Check if Web ECR repository exists
        id: check-web-ecr
        env:
          ENVIRONMENT: ${{ steps.setup-environment.outputs.environment }}
        run: |
          if aws ecr describe-repositories --repository-names nagiyu-codec-converter-$ENVIRONMENT --region ${{ env.AWS_REGION }} 2>/dev/null; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check if Batch ECR repository exists
        id: check-batch-ecr
        env:
          ENVIRONMENT: ${{ steps.setup-environment.outputs.environment }}
        run: |
          if aws ecr describe-repositories --repository-names nagiyu-codec-converter-ffmpeg-$ENVIRONMENT --region ${{ env.AWS_REGION }} 2>/dev/null; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: CDK Deploy (Create ECR Repositories)
        if: steps.check-web-ecr.outputs.exists == 'false' || steps.check-batch-ecr.outputs.exists == 'false'
        env:
          ENVIRONMENT: ${{ steps.setup-environment.outputs.environment }}
        run: |
          echo "Creating ECR repositories..."
          npm run deploy --workspace=codec-converter -- ${{ steps.setup-environment.outputs.stack-name }} \
            --context env=$ENVIRONMENT \
            --context deploymentPhase=ecr-only \
            --verbose

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

  build-web:
    name: Build and Push Web Image
    runs-on: ubuntu-latest
    needs: prepare-infrastructure

    permissions:
      contents: read

    outputs:
      app-version: ${{ steps.get-version.outputs.app-version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version from package.json
        id: get-version
        working-directory: ./services/codec-converter/web
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "app-version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Application version: $VERSION"

      - name: Build Web application
        uses: ./.github/actions/build-web-app
        with:
          workspace: 'codec-converter-web'
          shared-workspaces: '@nagiyu/common,@nagiyu/browser,@nagiyu/ui,@nagiyu/aws,codec-converter-core'

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Web Docker image
        uses: ./.github/actions/build-docker-image
        with:
          dockerfile: services/codec-converter/web/Dockerfile
          image-tag: ${{ steps.login-ecr.outputs.registry }}/nagiyu-codec-converter-${{ needs.prepare-infrastructure.outputs.environment }}:latest
          app-version: ${{ steps.get-version.outputs.app-version }}

      - name: Push Web Docker image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: nagiyu-codec-converter-${{ needs.prepare-infrastructure.outputs.environment }}
          IMAGE_TAG: latest
        run: |
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

  build-batch:
    name: Build and Push Batch Worker Image
    runs-on: ubuntu-latest
    needs: prepare-infrastructure

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version from package.json
        id: get-version
        working-directory: ./services/codec-converter/batch
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "app-version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Application version: $VERSION"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Batch Docker image
        uses: ./.github/actions/build-docker-image
        with:
          dockerfile: services/codec-converter/batch/Dockerfile
          image-tag: ${{ steps.login-ecr.outputs.registry }}/nagiyu-codec-converter-ffmpeg-${{ needs.prepare-infrastructure.outputs.environment }}:latest
          app-version: ${{ steps.get-version.outputs.app-version }}

      - name: Push Batch worker Docker image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: nagiyu-codec-converter-ffmpeg-${{ needs.prepare-infrastructure.outputs.environment }}
          IMAGE_TAG: latest
        run: |
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

  deploy:
    name: Deploy Full Stack
    runs-on: ubuntu-latest
    needs: [prepare-infrastructure, build-web, build-batch]

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js and install dependencies
        uses: ./.github/actions/setup-node
        with:
          node-version: '22'
          cache-dependency-path: './package-lock.json'

      - name: Build common infrastructure package
        run: npm run build --workspace=@nagiyu/infra-common

      - name: Build CDK project
        run: npm run build --workspace=codec-converter

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: CDK Deploy (Full Stack)
        env:
          ENVIRONMENT: ${{ needs.prepare-infrastructure.outputs.environment }}
          STACK_NAME: ${{ needs.prepare-infrastructure.outputs.stack-name }}
          APP_VERSION: ${{ needs.build-web.outputs.app-version }}
        run: |
          echo "Deploying full stack..."
          npm run deploy --workspace=codec-converter -- $STACK_NAME \
            --context env=$ENVIRONMENT \
            --context deploymentPhase=full \
            --verbose

      - name: Update Lambda function code
        env:
          ENVIRONMENT: ${{ needs.prepare-infrastructure.outputs.environment }}
        run: |
          # Get ECR repository URI
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          ECR_REGISTRY="$ACCOUNT_ID.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com"
          IMAGE_URI="$ECR_REGISTRY/nagiyu-codec-converter-$ENVIRONMENT:latest"

          # Update Lambda function code
          aws lambda update-function-code \
            --function-name "nagiyu-codec-converter-$ENVIRONMENT" \
            --image-uri "$IMAGE_URI" \
            --region ${{ env.AWS_REGION }}

          echo "Lambda function code updated with image: $IMAGE_URI"

      - name: Wait for Lambda update to complete
        env:
          ENVIRONMENT: ${{ needs.prepare-infrastructure.outputs.environment }}
        run: |
          aws lambda wait function-updated \
            --function-name "nagiyu-codec-converter-$ENVIRONMENT" \
            --region ${{ env.AWS_REGION }}

          echo "Lambda function update completed"

      - name: Display stack outputs
        env:
          STACK_NAME: ${{ needs.prepare-infrastructure.outputs.stack-name }}
        run: |
          echo "=== CDK Stack Outputs ==="
          aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" \
            --query "Stacks[0].Outputs" \
            --region ${{ env.AWS_REGION }} \
            --output table
