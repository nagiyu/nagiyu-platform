name: バグ修正
description: バグや不具合の修正タスク
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        ## 実装時の注意事項

        実装前に必ず以下のドキュメントを確認してください:
        - [コーディング規約・べからず集](../../docs/development/rules.md)
        - [アーキテクチャガイドライン](../../docs/development/architecture.md)
        - [開発方針](../../docs/README.md)

  - type: textarea
    id: bug-description
    attributes:
      label: バグの内容
      description: 発生しているバグの詳細を記述してください
      placeholder: XXXの機能でYYYを実行すると、ZZZのエラーが発生する
    validations:
      required: true

  - type: textarea
    id: reproduction-steps
    attributes:
      label: 再現手順
      description: バグを再現するための手順を記述してください
      placeholder: |
        1. XXXページにアクセス
        2. YYYボタンをクリック
        3. ZZZが表示される
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: 期待される動作
      description: 本来どのように動作すべきかを記述してください
      placeholder: XXXが表示されるべき
    validations:
      required: true

  - type: textarea
    id: actual-behavior
    attributes:
      label: 実際の動作
      description: 現在の動作を記述してください
      placeholder: YYYが表示される
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: 環境情報
      description: バグが発生する環境を記述してください
      placeholder: |
        - OS: Ubuntu 22.04
        - ブラウザ: Chrome 120
        - Node.js: v22.0.0
    validations:
      required: false

  - type: textarea
    id: related-docs
    attributes:
      label: 関連ドキュメント
      description: 関連する設計書や仕様書へのパスを記載してください
      placeholder: |
        - docs/services/example/requirements.md
        - docs/services/example/basic-design.md

  - type: markdown
    attributes:
      value: |
        ## 実装方針（Sonnet 引き継ぎ用）

        以下は実装フェーズで参照する情報です。Sonnet に実装を移譲する場合や、別セッションで再開する場合に備え、可能な限り詳細に記載してください。

  - type: textarea
    id: fix-approach
    attributes:
      label: 修正方針
      description: 想定する修正アプローチ・根本原因への対処方針
      placeholder: |
        - 原因: XXX が YYY のとき null を返す
        - 修正: ZZZ ガードを追加し、デフォルト値を返す
    validations:
      required: false

  - type: textarea
    id: target-files
    attributes:
      label: 対象ファイル・モジュール
      description: 変更する主要なファイル・モジュール（パスを記載）
      placeholder: |
        - libs/common/src/utils/XXX.ts（修正）
        - services/tools/src/app/page.tsx（修正）
    validations:
      required: false

  - type: textarea
    id: dependencies
    attributes:
      label: 依存関係・前提条件
      description: 実装の前提となる既存機能・ライブラリ・ブロッカーになる別 Issue
      placeholder: |
        - @nagiyu/common の dist ビルドが必要
        - #1234 のマージが先行する
    validations:
      required: false

  - type: textarea
    id: implementation-notes
    attributes:
      label: 実装上の注意点
      description: 設計判断・後方互換性・テスト方針・パフォーマンス・セキュリティなど
      placeholder: |
        - 既存テストへの影響を確認
        - 再発防止のため境界値テストを追加
    validations:
      required: false

  - type: checkboxes
    id: implementation-checklist
    attributes:
      label: 実装チェックリスト
      description: 実装時に確認すべき項目
      options:
        - label: ルールドキュメントを確認した
          required: true
        - label: バグの原因を特定した
        - label: 修正内容のテストを追加した
        - label: ドキュメントを更新した（必要な場合）

  - type: textarea
    id: additional-context
    attributes:
      label: 追加情報
      description: その他の補足情報があれば記載してください
