name: リファクタリング
description: コードのリファクタリングや改善タスク
title: "[Refactor] "
labels: ["refactor"]
body:
  - type: markdown
    attributes:
      value: |
        ## 実装時の注意事項

        実装前に必ず以下のドキュメントを確認してください:
        - [コーディング規約・べからず集](../../docs/development/rules.md)
        - [アーキテクチャガイドライン](../../docs/development/architecture.md)
        - [開発方針](../../docs/README.md)

  - type: textarea
    id: refactor-target
    attributes:
      label: リファクタリング対象
      description: リファクタリングする対象のコードやモジュールを記述してください
      placeholder: services/tools/src/components/XXX.tsx
    validations:
      required: true

  - type: textarea
    id: current-issues
    attributes:
      label: 現状の問題点
      description: 現在のコードの問題点や改善すべき点を記述してください
      placeholder: |
        - コードの可読性が低い
        - テストが困難
        - パフォーマンスに問題がある
    validations:
      required: true

  - type: textarea
    id: refactor-goal
    attributes:
      label: リファクタリング後の目標
      description: リファクタリング後にどのような状態になるべきかを記述してください
      placeholder: |
        - コンポーネントを小さく分割し、再利用性を向上
        - テストカバレッジを80%以上に向上
        - レンダリングパフォーマンスを50%改善
    validations:
      required: true

  - type: dropdown
    id: refactor-type
    attributes:
      label: リファクタリングの種類
      description: リファクタリングの主な種類を選択してください
      options:
        - コード可読性の改善
        - アーキテクチャの改善
        - パフォーマンスの改善
        - テスタビリティの改善
        - セキュリティの改善
        - その他
    validations:
      required: true

  - type: textarea
    id: related-docs
    attributes:
      label: 関連ドキュメント
      description: 関連する設計書や仕様書へのパスを記載してください
      placeholder: |
        - docs/services/example/basic-design.md
        - docs/services/example/detailed-design.md

  - type: markdown
    attributes:
      value: |
        ## 実装方針（Sonnet 引き継ぎ用）

        以下は実装フェーズで参照する情報です。Sonnet に実装を移譲する場合や、別セッションで再開する場合に備え、可能な限り詳細に記載してください。

  - type: textarea
    id: refactor-approach
    attributes:
      label: リファクタリング方針
      description: 採用するリファクタリングアプローチ・段階的移行の有無・既存パターンの再利用
      placeholder: |
        - XXX を共通モジュールに切り出して再利用化
        - 段階的に YYY を ZZZ に置き換え（既存呼び出し元は互換維持）
    validations:
      required: false

  - type: textarea
    id: target-files
    attributes:
      label: 対象ファイル・モジュール
      description: 変更または新規作成する主要なファイル・モジュール（パスを記載）
      placeholder: |
        - libs/common/src/utils/XXX.ts（新規）
        - services/tools/src/components/YYY.tsx（修正）
        - services/tools/src/components/ZZZ.tsx（削除）
    validations:
      required: false

  - type: textarea
    id: dependencies
    attributes:
      label: 依存関係・前提条件
      description: 実装の前提となる既存機能・ライブラリ・ブロッカーになる別 Issue
      placeholder: |
        - @nagiyu/common の dist ビルドが必要
        - #1234 のマージが先行する
    validations:
      required: false

  - type: textarea
    id: implementation-notes
    attributes:
      label: 実装上の注意点
      description: 設計判断・後方互換性・テスト方針・パフォーマンス・セキュリティなど
      placeholder: |
        - 既存テストへの影響を確認
        - 公開 API のシグネチャは変更しない
        - リファクタ前後で挙動が変わらないことを回帰テストで担保
    validations:
      required: false

  - type: checkboxes
    id: implementation-checklist
    attributes:
      label: 実装チェックリスト
      description: 実装時に確認すべき項目
      options:
        - label: ルールドキュメントを確認した
          required: true
        - label: 既存の機能に影響がないことを確認した
        - label: テストカバレッジ80%以上を確保した
        - label: パフォーマンス測定を実施した（該当する場合）
        - label: ドキュメントを更新した

  - type: textarea
    id: additional-context
    attributes:
      label: 追加情報
      description: その他の補足情報があれば記載してください
