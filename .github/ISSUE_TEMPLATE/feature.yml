name: 新規機能実装
description: 新しい機能やサービスの実装タスク
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        ## 実装時の注意事項

        実装前に必ず以下のドキュメントを確認してください:
        - [コーディング規約・べからず集](../../docs/development/rules.md)
        - [アーキテクチャガイドライン](../../docs/development/architecture.md)
        - [開発方針](../../docs/README.md)

  - type: textarea
    id: description
    attributes:
      label: 機能の概要
      description: 実装する機能の概要を記述してください
      placeholder: この機能は...
    validations:
      required: true

  - type: textarea
    id: requirements
    attributes:
      label: 要件
      description: 機能要件と非機能要件を記述してください
      placeholder: |
        ### 機能要件
        - 要件1
        - 要件2

        ### 非機能要件
        - パフォーマンス要件
        - セキュリティ要件
    validations:
      required: true

  - type: textarea
    id: related-docs
    attributes:
      label: 関連ドキュメント
      description: 関連する設計書や仕様書へのパスを記載してください
      placeholder: |
        - docs/services/example/requirements.md
        - docs/services/example/basic-design.md

  - type: markdown
    attributes:
      value: |
        ## 実装方針（Sonnet 引き継ぎ用）

        以下は実装フェーズで参照する情報です。Sonnet に実装を移譲する場合や、別セッションで再開する場合に備え、可能な限り詳細に記載してください。

  - type: textarea
    id: implementation-approach
    attributes:
      label: 実装方針
      description: 採用する実装アプローチ・既存パターンの再利用方針・主要な設計判断
      placeholder: |
        - 既存の XXX パターンに準拠して YYY を追加
        - ZZZ ライブラリの aaa API を利用
        - 新規 Repository を core 配下に追加し、web 層から呼び出し
    validations:
      required: false

  - type: textarea
    id: target-files
    attributes:
      label: 対象ファイル・モジュール
      description: 変更または新規作成する主要なファイル・モジュール（パスを記載）
      placeholder: |
        - libs/common/src/utils/XXX.ts（新規）
        - services/tools/src/app/page.tsx（修正）
        - services/tools/src/components/YYY.tsx（新規）
    validations:
      required: false

  - type: textarea
    id: dependencies
    attributes:
      label: 依存関係・前提条件
      description: 実装の前提となる既存機能・ライブラリ・外部サービス、ブロッカーになる別 Issue
      placeholder: |
        - @nagiyu/common の dist ビルドが必要
        - #1234 のマージが先行する
        - DynamoDB テーブル設計の確定が必要
    validations:
      required: false

  - type: textarea
    id: implementation-notes
    attributes:
      label: 実装上の注意点
      description: 設計判断・パフォーマンス・セキュリティ・テスト方針・後方互換性など
      placeholder: |
        - エラーメッセージは ERROR_MESSAGES に定数化
        - ユニットテスト追加（カバレッジ 80% 維持）
        - 既存 API との後方互換性を維持
    validations:
      required: false

  - type: checkboxes
    id: document-rules
    attributes:
      label: ドキュメント作成ルール
      description: ドキュメントを作成する場合は以下を確認してください
      options:
        - label: ドキュメントは `docs/` 配下に配置
        - label: 最小限のルール原則を遵守（必須事項のみ記載）
        - label: .vscode/settings.json の設定に従う（Markdown インデント 4スペース）

  - type: checkboxes
    id: implementation-checklist
    attributes:
      label: 実装チェックリスト
      description: 実装時に確認すべき項目
      options:
        - label: ルールドキュメントを確認した
          required: true
        - label: テストカバレッジ80%以上を確保した
        - label: ドキュメントを更新した
        - label: CI/CD 設定を追加/更新した（新規サービス・ライブラリの場合）

  - type: textarea
    id: additional-context
    attributes:
      label: 追加情報
      description: その他の補足情報があれば記載してください
