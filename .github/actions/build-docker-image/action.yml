name: Build Docker Image
description: Build Docker image with docker build lock and optional build args

inputs:
  dockerfile:
    description: Dockerfile path (e.g. services/stock-tracker/web/Dockerfile)
    required: true
  image-tag:
    description: Docker image tag to build
    required: true
  build-args:
    description: 'Build args as KEY=VALUE lines (e.g. APP_VERSION=1.0.0)'
    required: false
    default: ''

runs:
  using: composite
  steps:
    - name: Acquire Docker build lock
      uses: ./.github/actions/docker-build-lock-acquire

    - name: Build Docker image
      shell: bash
      env:
        DOCKER_BUILDKIT: 0
        DOCKER_BUILD_ARGS: ${{ inputs.build-args }}
      run: |
        ./.github/scripts/docker-build-with-retry.sh \
          "${{ inputs.image-tag }}" \
          "${{ inputs.dockerfile }}"

    - name: Release Docker build lock
      if: always()
      uses: ./.github/actions/docker-build-lock-release
